front:
  text: 序嘉靖庚寅冬有非時之暖痘災盛行而死者過半豫甚憫焉於是探索群書見有論治痘瘡者纂為一編以備倉卒易為檢閲免致臨病而荒忙失措也世之治痘者多宗錢氏之論或用陳氏之方二家互有得失罔獲萬全豫心若有所未慊者而既獲睹浙之桂岩魏先生博愛心鑑其論一本於太極其治皆出於特見誠哉度越乎前人而超邁乎等夷者也豫昔之所未慊者茲皆豁然而慊於心矣何其幸哉所論痘瘡皆由於淫火之毒只此一語便見其造理之真到也蓋男女交感罔不縱情恣欲而扇動五藏厥陽之火五藏之精血已自孕有火毒於焉施化以成男女之形則兒之五藏百骸非火毒所潛伏火與元氣不容兩立殆必待時而發耳所以多感異氣而發者淫欲之火亦異氣也以異感異譬猶火就燥水就濕同類相召寧弗應乎豫今所輯以諸家所論列之於前而以魏君之説辨之於後庶得以為全書而凡諸説之同異得失亦皆瞭然不復為其所惑矣書成因名之曰痘治理辨刊梨廣布嘉與四方共之按法施治庶或免死於非命也豈忍私之於一家云嘉靖辛卯十一月長至日新安祁門汪機省之序
