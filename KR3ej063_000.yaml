body:
  text: 題石山痘治理辨治小兒方書余閲之多矣獨治痘瘡者卒欲一得焉未也友人陳惟宜時遊石山先生門因過之而以先生所纂曰痘治理辨者以示余且曰將梓以廣其傳余披再三其前列諸家説而以浙之桂岩魏先生之説辨之於後撮觀桂岩之説所謂小兒痘瘡皆原男女淫毒所蒸者實獨見邃理之言石山先生蚤以文學名而於百家諸書日不釋手以求其至理所在宜其有取於桂岩之説與其方而旨哉斯辨無復辨也時患小兒痘瘡者誠於先生之所取者而效法焉吾以天下以痘為殤者寡矣且梓以廣其傳亦庶乎夫子少懷之意也宜題諸首時時嘉靖甲午六月念六日邑人輝山胡希紹書痘治理辨一原痘魏氏曰痘者豆也象其形而名之也順其形則順逆其形則逆以見前人命名之義有在矣蓋痘之為證根於精血之初而成於淫火之後男女交媾無欲不行無火不動欲因火生火因欲熾精行血就何莫而非火之所為且二五妙合精血鎔治而成藏府皮毛筋骨之形夫形既成而火即以中乎衆體無象無臭人可得而測耶毒中必發特俟其時耳俟時而發必假氣血故痘毒非氣弗領非血弗載使氣不盛則何能逐其毒血不榮則何能任其毒氣血領載之功不前又烏乎能解又若痘有稀稠乃受火有淺深而其吉凶生死亦皆於此焉分或遇天行時氣擊動而發者蓋天地之沴氣與人身之遺毒同一橐鑰相感而動如水流濕火就燥云從龍風從虎之義而又人之真氣與客氣不容並立故也豫常愍其克害生靈非天之設非火之罪誠父母之過也明者鑑之二預防痘疹或遇天氣溫熱恐發痘疹用犀角玳瑁二味磨汁服或用茜草煎汁與消之未發者令內消已發者亦能解利使毒氣不致太盛冬月應寒而反溫暖前人推度至春陽氣發生與冬之伏熱相搏必生痘疹故於冬月見兒頭髮豎直飲食似減此伏熱之兆便宜預服油劑或升麻湯三豆飲子消毒飲子以防之又云或有伏熱痘疹未出四肢微熱飲食似減或時額多微熱宜服生油劑最佳外臺方云時行溫暖便服油劑一法七八月間收葫蘆蔓連根留置十二月三十夜取蔓絲煎湯浴兒終身不發痘疹一法取絲瓜近蒂三寸連皮子燒灰存性為末砂糖拌干吃入硃砂末尤妙預服之多者令少重者令輕一説用硃砂太早恐瘡入目辨曰人傳有藥預投兒服則終身不出痘疹豈理也哉痘中於有生之初寂然不動感而遂通此得人身之大造化也人有三佰六十五骨應期變蒸諸骨十有三次五藏六府始能濬通脈絡行運氣血於身其蒸熱之時藏府無不振動變易之際經絡無不疏通又或有傷寒風熱而泄六陽等汗諸瘡癰腫丹毒一身之間無不發泄其痘毒尚不能解又何藥可以解此毒耶雖東垣救苦散亦何益於是哉三痘疹當辟惡氣仲景云痘疹未生之間宜辟惡氣著人守門勿令外人説房恐有觸犯其中縱得安者亦必瘢痕經年黑色宜燒乳香最闢諸惡氣蓋榮衛遇香則行遇臭則止故也腋下狐臭氣房中淫液氣遠行勞汗氣溝糞濁惡氣婦人經候氣諸血腥臭氣硫黃蚊煙氣吹滅燈燭氣誤燒頭髮氣柴煙魚骨氣蔥蒜韭薤氣煎炒油煙氣醉酒葷腥氣麝香臊穢氣射酒兒吃發出兒聞瘡畜入已上皆不可犯令兒變動蓋親歷驗也或曰田舍小兒犯之都無變動者痘疹正出之時必資穀氣以養其內謹避風寒以護其外若乳哺虧少邪氣侵襲為患不淺能食童子毋令失飢過飽觸冒穢汙房中多挂胡荽以酒噴之燒蒼朮乳檀降香使榮衛得香運行甚速無瘡爛成片變黑陷伏臭爛刮痛悶亂之患辨曰世有生人香臭經水邪祟而犯之説甚為不經但所禁者煎煿炒油煙恐傷咽喉致有不安然亦無害耳醫不解理強以辛燥惡毒發泄中氣之劑投之痘必隨起隨陷治者見之不悟己非反言觸犯嗚呼愚哉豫治痘不使內虛故恆無變易之患是雖觸冒庸何傷哉又有避風寒常溫暖之説此實得治痘之要旨如痘發之際不拘四時要得和暖如春使其氣血調暢毒可自釋慎勿以野處船居者為比彼則自小風寒經煉略加遮蔽則亦和暖矣四諸熱失治變為瘡疹凡傷寒傷風傷食風熱等症均是熱也醫者慮熱不解將為痘疹早為防備乃良工也預防隨其虛實或汗或下或解毒也且如發熱如瘧狀熱作有時者潮熱發熱倍能飲食唇紅面赤大小便祕脅下有汗者風熱面赤鼻流清涕手足煩躁自汗惡風左額有青筋紋者傷風熱手足指微冷面青色慘耳鼻冷惡寒無汗煩躁左額有青紋者傷寒熱眼胞腫右額有青筋頭熱壯熱胸滿不食腹脹者食積熱額正中髮際有青紋下至眉心手掌心有汗面青紅獨處不安時發驚悕手絡微動似驚惕者驚熱發熱多渴渴則瀉者疳熱發熱唇上下汗出唇中間起一白泡及耳陰皆冷者變蒸熱變蒸之中偶有時行寒疫者則耳與陰反熱此異氣熱也發熱而皮膚或赤色熱痛時時驚叫者丹熱發熱目閉面色赤者胎熱且此諸症皆熱也熱毒蘊於肌中失於治療皆可變為痘疹故傷寒失治則有胃爛發班冬溫失治則有溫毒發班由此而知痘疹發熱之初若能疏散則不致熱鬱而成痘疹矣痘疹發熱則耳冷鼽冷咳嗽又兼五藏見痘為異也痘疹為內實而生熱毒由兒在母腹中所受非若內虛而感外寒之比蓋古方論云風熱傷胎生兒口禁風冷傷胎生兒躽啼納汙則為血癖胎弱則為諸癇積驚而夜啼蘊熱而班毒以此觀之子之痘疹在母腹中蘊熱毒也非若一歲中有異氣及暴時疫之比痘疹多隨天氣而蒸出緣兒在母腹中食穢而成蘊熱卻能隨天氣非時之暖而蒸出如冬月應寒而反熱謂之冬溫亦有隨春氣暄暖而出者有因他病發熱而蒸出者此皆發熱於外所蘊熱毒隨之出於肌中為痘疹醫者不能防備見其熱而攻其熱殊不知因他病蒸發而其中有瘡疹痘存焉方書云瘡疹與他症相似疑似之間宜升麻湯及已髮結痂疕亦宜服解利之藥正患瘡疹並稟受怯弱者皆不宜用可用獨聖散荊芥散安班散紅子湯快班散如聖散調中散犀角湯化毒湯紫草木通湯牛蒡散紅綿散消毒散控心散奪命散黃耆散皆可選用五太尉因墜鞦韆發驚搐醫以發熱治之不愈錢曰本急驚後生大熱當先下其熱以大黃丸茲乃用玉露散惺惺丸加牛黃腦麝解之不愈至三日肌膚尚熱錢曰更二日不愈必發痘疹蓋熱不能出也他醫初用發散二三引熱入表表熱而痘生其初驚時當用利驚丸下之而與發散乃逆也後二日果痘出以必勝散治之七日而愈驚邪亦異氣也辨曰痘必感天之乖戾然後而發而解如磁石引針琥珀拾芥以其性類之相感若或以磁石感芥琥珀應針則不能矣痘之解必假其氣血氣血弱而不能製毒又必籍藥物氣味補益匡扶之力非謂藥能解是毒也又曰痘毒之火實陰陽相亢而中與天之沴氣如冬暖夏寒乃陰陽之偏氣痘亦中陰陽之偏氣同其軌轍莫不因時感動而發猶鏡之取火鏡中火雖在焉使無日之晶光相射則何能發也是故治痘之要必須加治於氣血然氣在內而外不及則血載毒出為外剝氣在外而內不續則血載毒入為內攻即陽道虛陰泩從之陰道虛陽泩從之之義非保元湯薑補氣血之過則不能施其功妙故用人參以固元內實則能續衛氣之不足黃耆以補表外實則能益其元氣於有餘而又以桂制其血血在內引而出之則氣從內入血在外引而入之則氣從外出而參耆非桂之逐血引導則不能樹其功桂亦非甘草平和氣血則不能緒其條理雖則隨其土地所宜以他藥攻之終不能出乎四品君臣之要劑也錢氏曰十太尉病痘疹其父曰疹未出屬何藏府錢曰胎在腹六十日已成形食母穢液入兒五藏食至十月滿兒胃脘至生之時口有不潔産母以手拭淨則無疾病俗以寅連汁壓下臍糞及涎穢此亦母之不潔餘氣入藏中本先因微寒入因外感微寒激內之穢熱而成瘡疹未出五藏皆見病症內一藏受穢多者乃出瘡疹初欲病時先呵欠頓悶肝時發驚搐心手足冷乍涼乍熱多睡脾面頰燥咳嗽噴嚏肺此五藏症見也惟腎無候以在府下不能食穢故也凡瘡疹乃五藏毒若出歸一症則汗水泡肺膿泡心班脾疹惟腎不食穢毒而無瘡毒黑者屬腎由不慎風冷而不飽內虛也用抱龍丸數服而愈以其別無他候故未發出則見五藏症也已出則歸一藏矣小兒初生口中惡血以棉裹指拭之兒吞惡血在胸膈者吐以甘草惡血入腹中利以黃連緑豆粉千金論云小兒初生灌生地黃汁數蜆殼而下黑糞則無痘疹矣此皆防微杜漸以疏利為良也何嘗拘於臨發熱時而後利之耶辨曰前人謂痘出之由言小兒初生時口含胎血咽下至於腎經以致如此豫謂兒在胞中氣團於內血護於外內外堅固風氣不通惟臍帶中隨母呼吸而水穀之氣窨入兒腹即胞漿是也以此長養兒體如血走漏其胎不成或有墮胎者此則損傷胎血故也及至降生根蒂脫於左腎母氣始離而授於子氣即從丹田湧出兒之口鼻鬱悶不禁頭於體故從下踴躍而出也豈有兒含胎血之理間有降生之際母血太盛灌入口鼻者有之縱使胎血灌入口鼻而咽下腸胃開乳之後亦必從大便而出矣又豈有進入腎經之事乎且腎有二一為腎一為命門皆繫於筋之盡處權骨兩傍初無門路通腎況血本有形之餘物亦母形之餘何由含兒之口咽下入腎藏畜至一歲及六七歲而後始發為毒且初生兒未經變蒸一塊氣血天一生水故始生三十二日一變生癸又三十二日一變生壬凡六十四日氣血始通表裡配合足少陰太陽二經始能用事其胎血又豈能久留於腹傳入於腎經哉誠為不通之説又曰淫者欲之溢也火者欲之極也夫自男女交媾恣情肆欲火熾淫生縱其烈熾火毒已遺於精血間矣精血成孕藏府皮毛筋骨要皆此火之突然寧不因時隨勢而發故曰痘之所在皆淫火之所在也又曰男女一陰一陽各盡其道乃得乾坤之理而成其孕則不失天地生物之節豈有淫火於骨肉哉豈由食母之穢液哉又豈藥之所能潛消哉男子陽盛淫火起於氣女子陰盛淫火動於血氣盛而稠者陽毒也血盛而稠者陰毒也陽毒易治陰毒難理於此可見淫火遺患之不細矣錢氏曰瘡疹乃五藏毒若出歸一證則肝水泡肺膿泡心班脾疹惟腎不食穢毒而無瘡毒寅卯辰時潮熱屬肝當出水泡肝之液為淚淚出如水其色微青而小巳午未時潮熱屬心當出班瘡色赤而小以心主血申酉戌時潮熱屬肺當出膿泡肺之液為涕涕濁如膿其色微白而大亥子丑時潮熱當出疹子色赤黃而淡以脾裹血獨腎無瘡辨曰痘毒出於五藏而非獨一藏前人言五藏各主一色斯言謬矣然五色固有之而又不載各藏治法但用辛熱解毒發散之劑若此不過攻毒動氣之術耳痘果可以如此一例治之哉須察形色之淺深辨邪正之善惡治必固真氣以勝其毒斯為可也豫曾試驗無失如此者豈有顛沛之理哉機按水泡今俗謂之水疥膿泡今俗謂之膿疥疹者今俗謂之胎麻每兒常發三五次必待痘後乃止班者如蚊蚤所齧紅痕也亦有發丹熛者此皆兒所常患也若痘則始出皆血泡血泡變膿泡濃泡結痂疕而愈未嘗見其備見四症而後歸於一症也錢氏曰瘡疹初欲出時五藏皆見病證先呵欠頓悶肝也時發驚搐心也手足冷多睡乍涼乍熱脾也面赤痰嗽噴嚏肺也惟腎在下不受穢濁獨無其症腎之平候耳與尻尾骶骨俱冷也耳尻屬腎屬水又居臍下若瘡黑陷耳尻反熱乃變壞歸腎其症為逆辨曰痘出則各經俱動豈有腎不相干錢氏陳氏所論變黑歸腎此皆過於理也使能究之又何致血載毒逆經而出之理此以保元湯加芎桂補提其氣氣旺則諸毒自發黑者亦將轉而為黃此乃王道之大也於嘗留心於此屢試屢驗世醫不明其理竟用峻利致使氣血愈虧反因治而難救矣錢氏曰一大王瘡疹錢留抱龍丸三服又招李醫以藥下之其疹稠密錢見驚曰若非轉下則為逆病恐是原無大熱不應疹出稠密若因轉下則脾胃氣虛不能運行其熱故熱鬱而疹發稠密也王曰李已下之錢曰瘡疹始出未有他症不可下也但用平和藥頻與乳食勿傷風冷可也如瘡疹三日不出或出不快已則微發之指身熱不退兼疹不出言微發不出即加藥如升麻葛根湯發之不出即用分兩加重加藥不退即大發之加藥身熱不退再用麻黃黃芩等而大發之如大發後身涼脈平無症者乃瘡本稀不可更發也有大熱則當利小便大發之後尚有大熱則利小便小熱者當解毒若出快勿發勿下止用抱龍丸治之瘡痂若起能食者大黃丸下之指熱尚在言一二行即止今先下一日瘡疹未能出盡而稠密甚則難治也縱得安其病有三一疥二癰三目赤經三日黑陷錢曰幸不發寒而病未困也遂用百祥丸以牛李膏為助各一大服至五日瘡復紅活七日而愈蓋黑者歸腎也腎旺勝脾土不剋水故脾虛寒戰腎旺也則難治所用百祥丸以瀉膀胱之府府若不實藏自不盛也不瀉腎者腎主虛不受瀉故二服不效則加寒而死機按黑陷初由誤下所致後復用下法者正如傷寒下早邪入於府復用下法之類也五痘症與傷寒相似大抵痘之初症與傷寒相似發熱煩躁臉赤唇紅身痛頭疼乍寒乍熱噴嚏呵欠痰涎傷寒症候類有之此痘疹常候也或竄眼驚搐噤牙如風之狀或口舌咽喉腹痛或煩躁狂悶昏睡或自汗或下利或發熱或不發熱此常候之中又兼有此症朱氏曰痘疹症狀雖與傷寒相似痘疹治法實與傷寒不同傷寒所傳從表入里痘疹所發從里出表蓋毒根於裡若下之則內氣一虛毒不能出而返入焉由是土不勝水黑陷者有之毒發於表若汗之則榮衛一虛重令開泄轉增瘡爛由是風邪乘間變症者有之汗下二説古人深戒傷寒與瘡熱相混頭疼發熱惡寒鼻流清涕左額有青紫紋者感寒也蓋感寒在表寒極生熱熱則瘡疹隨出若不去其寒則瘡疹不能出故表症身熱而喘宜微汗和解之里症腹脹大便祕小便赤宜微利之煩躁渴甚者但利其小便胸滿食不下者宜吐之皆是去感寒伏熱邪氣也但用藥不可令太過太過於表則為班爛口傷爛赤過於下則為痞悶為內陷為下膿血緣有瘡疹隨出故用藥非感寒之比凡覺身熱症似傷寒若未經痘疹疑似未明且先與惺惺散或人參羌活散一説未發已發並與參蘇飲為當痘瘡始作身熱似傷寒口與耳少冷腳冷或腹痛者知是痘矣當大便祕腮頰赤若大便自利面青手足冷宜溫之若藏府如常或祕者可用蟬蛻散樺皮湯發灰飲兔肉醬兔毛煎湯浴之痘疹初覺似傷寒面與四肢俱赤壯熱頭疼腰背痛足冷眼睛或黃或赤脈多洪數絶大不定大便祕小便赤雖是痘疹未攻皮毛穴出者可服疏利毒氣之藥若痘瘡已結皮毛穴間微微自出即不可疏利也六傷風傷寒變為痘疹是汗下失時之過辨曰痘之發必動於血血動必犯氣位而熱生矣是氣血有礙百脈而然也夫血載毒奔行氣分而出斯毒有定位人身之經絡亦必由此而虛耗錯亂矣蓋經絡者乃氣血之道路也故見影后六日氣血向外傳府痘必七日發足又六日氣血向內傳藏痘必七日歸結為因藏府受傷脈絡自然清理非謂痘之能傳於經也痘亦借氣血傳足之餘潤而發而解何哉傳府氣血從外生氣亦向外痘至七日而發傳藏氣血從內生氣乃歸服痘至十四日而斂此其天地消長之道也或痘出毒盛氣血弱而不能濟其危將何以實其虛耗哉故經絡無傳兒之生命不保七日內傳外外不足則內攻而死又七日傳外足則傳內內不足則外剝而死於此足以見氣血虧而不能勝其所勝痘之傳變如此慎不可作傷寒治先賢謂痘症似傷寒必有所在後之醫者為此而誤多矣蓋以不明似之義也七治痘疹汗下宜忌首尾俱不可下首尾俱不可下及溫暖蓋覆不令通風皆前人所論其曰首不可下者為班未見於表下則邪氣不得伸越此脈症有表而無里故禁首不可下也尾不可下者為班毒已見於外內無根蒂大便不實無一切里症下之則班氣逆陷故禁尾不可下也覆蓋不令通風以其班未出或身表冷而惡寒或天令寒而霜冷故令蓋覆若班已出身熱天暄何必蓋覆大抵前人之言隨時應變以其所可者言之後人不知其義故持常而不知變也噫首尾俱不可下者以其始終藏府元無凝滯也若有一切里症及大便結者安得不下溫暖蓋覆以其發在冬時也若發在夏班雖未出亦不用於此矣可下班點未出內外熱盛毒在藏府宜微下之又曰痘瘡出定大便不通膿汁不幹亦可下之由此觀之當下者在病之始未出之前及已結痂疕之後不可於正出之時下之也機按後條痘出太盛喘促腹滿小便赤手足心並腋下有汗或亂言妄語大便不通宜小承氣湯是正出之時亦有下者熱盛痘瘡未見乃可疏利是痘未形見間毒在藏府宜預下之痘已出足而結膿窠尚有熱症見者當利大小便此恐里有餘毒未盡因而生疾故也疏利與轉下不同痘瘡屬血熱轉下屬穀氣蓋班毒未出則宜疏散熱毒導引快利使無壅遏何嘗以轉下為法況疏利與轉下大異疏利者如三豆飲子油劑生地黃茜根紫草湯升麻湯之類此皆用於痘疹未發之前也轉下之法因瘡疹外熱藏府受熱內外皆熱遂令正患痘疹之中大便祕裡急後重小便赤澀腹滿而喘渴飲水漿手掌心並腋下汗出譫語妄言能食不結痂疕此是胃中谷氣痘疹熱毒蒸蘊之甚方可令大便調過一二次使里無壅遏之患而已然亦不可過利使內虛而瘡陷下也班未出前內有熱症可下者則下之若班已出及結痂疕之後或毒氣在藏則宣利之毒氣在肌膚則疏散之二者須適其宜也不可下大便數日不通熱蓄血聚壅遏不行熱必增劇不得已則下之大便既如常有大熱症者但利其小便則雖熱亦不能為害矣大便濡泄用下藥而愈者百中無一雖或有之是食積或冷熱不和互相為害但半補半利去其食積分其冷熱此非正下者也已下不宜再下瘡疹未見已曾利之今瘡疹始出則內無壅滯縱有亦已輕矣若有熱者但解毒則熱亦庶幾焉再利是重虛也五藏不可再傷小便清不可下此無裡熱也大便堅小便數不可用承氣湯是津液已行於小便但用麻仁脾約丸可也大便硬小便少者未可攻此津液當還入胃中大便自利也陽明病自汗出或發汗小便自利者不可下此表裡皆亡津液也古人治病未有不從飲食大小便自外而知里也首尾不可汗下痘疹症候雖與傷寒相似治法實與傷寒不同傷寒從表入里痘瘡從里出表蓋毒根於裡若下之則內氣一虛毒不能出變黑歸腎身寒耳骫反熱眼合肚脹其痘黑陷者有之黑陷不特因下或脾土本虛不能勝水故用百祥丸以泄其水毒發於表若汗之則榮衛一虛重令開泄轉增瘡爛由是風邪乘間變症者有之汗下二説古人深戒表實當汗裡實當下要當隨時應變察其兒之勇怯觀其胃之虛實審其大小便之通祕宜汗則汗宜下則下當汗不汗則表熱不解而瘡有難出陷伏之患當下不下則內熱不除而瘡有變黑歸腎之厄故汗下二法須當詳審可汗痘疹未出發熱之初非微汗則表不解其症令人身熱頭痛鼻塞咽喉不利咳嗽目赤毛焦皮膚緊而脈數此皆熱極為瘡疹雖順而毒亦不輕宜微汗解散則痘出亦輕如水解散控心散麻黃湯等主之如班已出切勿用此有用發散隨汗為白珠子有出小紅點亦由汗而毒氣隨散不可不知痘瘡發熱身疼是時行寒熱所感未能解也宜麻黃湯水解散以解肌汗出寒熱自已瘡疹無阻不可汗痘稀不可表但看所蘊熱毒之微盛耳且痘出雖少以足心有者為出齊不可表也出齊而成血泡或結膿泡或水泡或至痂疕者皆不可表也若本稀而強表之則為班爛為倒靨為虛脫為中寒為虛熱按此言結膿窠及結痂疕之時皆不宜汗別條又謂正患痘疹遇暴寒所折膚腠閉密寒氣結聚以致膿窠不結痂疕者或遇暑氣大作與瘡熱並遏以致膿窠不結者若清便自調知其在表不在裡當微發散如升麻葛根湯參蘇飲之類是結膿窠之時亦有用表散者惟當視其症之可汗不可汗不可以結膿窠痂疕為拘也大小二便不可不通凡治痘疹大小二便不可不通一或閉焉則腸胃壅塞脈絡凝滯毒氣無從而發泄眼閉聲啞肌肉黧黑不旋踵而告變矣或小兒氣實煩躁熱熾大便祕結與犀角地黃湯或人參敗毒散又紫草飲多服亦能利之大便祕結內煩外熱者小柴胡加枳殼最當或少與四順清涼飲一説大便不通少與大黃尤宜仔細斟酌用之有大便自利所下黃黑則毒氣已減不必多與湯劑或少與化毒湯不用亦可大便不通非一症所下大結實如栗塊者風祕也煩躁引飲大便祕小便赤手掌心腋下有汗者熱祕也嘔吐清水不能食面青而瘦者冷祕也久病不能乳食腹不脹不裡急後重日夜不大便者虛祕也嬰兒有疾服藥但與乳母服之為要法嬰兒有疾服藥但與乳母服之為要法藥必流入於乳令兒飲之免其慓悍毒烈熏蒸藏府察其病中能食不大便後重手掌心腋下有汗當令大便如常或心熱啼哭小便不通心神不安當利其小便但將此藥與乳母服之是亦嬰兒服之也八痘疹發熱小兒有病發熱日數稍久便當預防為瘡疹蓋熱不解而熱毒運於肌中變為痘疹故也方其發熱之初急須表散使毒氣出府則成細疹矣要在一晝夜熱退為佳若不表散毒氣入藏則成痘矣如傷寒失於解表熱鬱而發班毒是也非微汗則表不解乃痘瘡未出表熱鬱實之時也非微利則里不解在紅點未見裡熱郁實之時也若於痘瘡正出未收之際妄汗則成班爛妄下則成陷伏矣大熱未見紅點胃熱潮作氣粗腹脹大小便祕煩渴譫語脈沉滑而數此裡熱大盛宜微下之則內無壅滯痘將自出熱甚與升麻葛根湯人參敗毒散葛根紫蘇皆解肌藥才覺傷風身熱未明是瘡不是瘡便宜發散用升麻湯大熱面赤氣粗或大小便利此里無熱乃表熱未解宜發散之壯熱日夜不退者劇痘疹未見能食者升麻湯糞結燥渴者四物湯合升麻湯加紫草或石膏不能食大小便如常補中益氣湯身熱熾盛則痘出愈難乃血氣為熱壅閉毒氣彌盛故也大便閉小便如血此裡熱實也身上破裂或生癰疱此表毒盛也皆由不善解利之過宜小柴胡加生地黃犀角地黃湯重者四順飲選而用之凡熱不可驟遏但輕解之如升麻葛根紫蘇之類若無熱則又不能發用藥發瘡當以漸熱數日瘡疹不出誠可慮也欲大發之懼其瘡本稀而成班爛成倒靨不發又無以散毒熱故錢氏論始以微發之微發之不出即加藥加藥不出則大發之大發之後或出不多或無瘡疹脈息和平則瘡疹本稀不可更發此皆用藥有漸可謂善醫者也熱氣衝心譫語妄言宜硃砂參苓之類蒸於肝則搐搦狀如驚癇宜防風羌活天麻金蠍南星之類蒸於脾則腹脹渴水目腫大便祕宜枳殼橘曲山梔地黃之類蒸於肺則喘急渴水咳嗽鼻乾宜桑白皮馬兜鈴半夏之類毒氣歸腎黑靨倒入者急用豬尾膏活血散熱而實者身熱大便祕小便赤澀脈洪數或沉大滑數煩躁悶亂痰壅喜居冷處手足心熱手心腋下有汗吐利而渴口氣熱咽燥口乾喘粗氣急目睛黃赤睡中驚悸譫語昏甚咳嗽痰盛面赤頭痛狂渴汗出燥渴引飲身熱腹脹氣促手足冷咽膈壅塞喉嚨腫痛治宜清熱解毒冷而虛者壯熱不渴面青目白睛不黃赤懶倦昏睡大小便利惡冷吐瀉乳食不進或不化腹脹自汗精神慢氣冷此宜甘溫之劑身熱脈遲脈數為熱脈遲為寒此最驗也數熱屬府遲寒屬藏今瘡在表屬府而外發熱脈反遲屬藏而為寒是脈不應病陽病而得陰脈也宜溫之以活血散當歸散人齒散之類若藏寒下利脈遲者宜甘草乾薑湯豆乳散之類其脈遲者是胃氣虛冷榮衛不足故也一人年十七發熱而昏倦甚脈大似數與參耆歸朮陳皮大料濃煎飲二十貼痘出又二十貼膿泡成身無全膚或欲用陳氏本方豫曰但虛無寒又與前方至六十貼而安至正甲申正月春暖邑間痘疫率用陳氏方死者百餘雖曰天數吾恐人事亦或未之盡也辨曰如初熱時或微或盛三二日身涼見痘作三四次而出又尖紅光澤飲食如常此其順也順者不煩治而自愈初熱時或驚悸不寧或作寒熱或吐瀉或腹痛甚者迷亂不省人事或悶亂喘急或連熱齊出色不光潤此其逆也逆者實則解散虛則補益如氣得其圓血得其附鮮明潤澤雖密可治此言逆中或有氣員血附尚可治也使其氣也不員血也不附紫泡黑陷者雖稀不治此言逆中更兼紫泡黑陷決不治治是者豈可忽諸升麻湯方云未發已發皆可服夫未發之意為末見紅點之前可服也已發之意為已結痂疕之後可服也今人執以已發未發皆可服曾不知稟氣厚者則庶幾稟氣薄者為害不淺遂遲速失度致於陷伏者多矣何謂稟氣厚能食唇紅頰赤渴水睡中譫語或時啼哭又遇天氣暄熱易生痘疹逐時以少藥疏利心肺使熱毒皆散縱有痘疹亦輕矣何謂稟氣怯內無蘊熱雖天氣暄熱尚面青大小便如常無熱者則不可輕用又云未能辨認間可服之是未見班點之前服之能消諸蘊熱而解毒於未然令內消也班點已見而服之反使寒弱出遲為寒中為陷伏所稟弱者最為大害丹溪曰但見紅點便忌升麻葛根湯恐發得表虛也玳瑁湯治未出內消已出解利並出得太盛者最良硃砂膏治痘已出未出皆可服多者可減少者可無硃砂為末蜜水調服辨曰有已出未出之際投以硃砂言能解是毒也噫砂非獨用之物性能鎮心氣而下行大泄元氣心乃氣血之主俾心氣不振榮衛勢弱痘必變而失色豫多見蹈此難而不救又非服食誤俗之可比則何有解毒致稀之説哉世用寒涼者不足語其治也用溫熱者庶乎近理錢陳之下皆不得其門而入烏足與語治法之肯綮歟機按痘之發熱必觀小兒勇怯若形色蒼實大便閉澀飲食能進表實無汗或大熱晝夜不解煩躁脈促喘滿者宜升麻葛根湯微汗以解之若大便二三日不通則利大便小便赤澀則利小便若形色怯弱大小便通利飲食少進或表虛自汗而大熱晝夜不解者又宜從補中益氣湯消息或仿丹溪前例以解其虛熱大便不利或四物合四君子多加紫草小便不利或四君子四物合導赤散庶免妄汗妄下之失辨曰痘之寒熱多主於內虛何則未出一二日間而發者為實此氣血與毒火相攻氣血旺而不受邪觸故也已發之後指痘發後而發者指發熱也則為虛矣發於毒盛者為邪勝指二三日間發於毒少者為虛極指痘出後發於結痂之後者為餘毒或用毒藥太過元氣虛損者為大逆或七日前後而獨熱者為痘蒸氣血氣血與毒俱盛之過也此當專抑其毒或和解湯或清涼飲或十四日後而獨熱者亦為餘毒易治又有七日前後而毒寒者為氣血損而獨火內郁亦毒盛之過也難治此當專補氣血如保元湯之類凡治此者實則發散以清其氣道虛則補益以固其真元實以升麻和解二湯主之虛以保元或加桂主之虛不可驟用大熱大寒之劑亦不可發散太過誠恐真元一損無復有可回之理矣豫治痘用藥縱則縱固則固不使氣血少傷縱毒入門如穀神響應之速也又曰夫痘之毒非熱不能發痘之出非熱不能損惟氣血二者之間得乎中道斯為美矣苟有當熱而反不熱者有不當熱而反熱者是皆逆之道也當熱者毒未出之前宜大熱以逐其毒非熱何能達表當熱反不熱者毒未出之際惟只頭溫足冷則不能盡發其毒致毒反攻其內此皆氣血盛衰之使然也不當熱者毒既出宜表裡和平長養氣血以助毒成漿也反熱者毒始出熱盛則氣血煎熬往來不寧不能拘收其毒毒無出路甚則氣泄血失之患皆即此而立見矣何以知其熱之盛也指毒始出熱盛但觀氣粗麵赤耳鼻丸反熱耳骫之間平時冷處今皆熱者是其症也然毒未出之不熱與毒既出而大熱治宜俱以保元湯加桂助氣血以逐其毒此治反不然者前實以升麻湯虛以和解湯此治反大熱者以意加減調平氣血尚何功之不收哉九痘出日數發熱二日三日方見微微欲出如粟米如豌豆大似水珠光澤明淨者極佳四日五日痘出大小不等根窠紅光澤明淨者輕如稠密或泄瀉或頂陷或灰白者重六日七日痘瘡肥紅光澤者輕如身溫氣促口乾腹脹足指冷者重八日九日痘瘡長足肥滿蒼蠟者輕如寒戰悶亂腹脹煩渴氣急咬牙者至重十日十一日痘瘡當靨痘痂欲結而愈也前人謂小兒虛實不等不可拘以日數有熱三日而成班六七日而生班者至十餘日而生班者但足上有班為出齊出齊之後長成血泡血泡七日當結膿窠苟或血泡之中尚有紅班點相夾而生則又不可拘以日數待其皆作血泡為齊血泡七日結膿窠此乃榮衛調和內外無諸感冒方能如期且如血泡正作之際遇天冷寒暑燥溫風不節氣候異宜因而遲速失序亦不可拘以日數但以紅點皆為血泡日為齊若出血泡七日病人氣虛尚有紅點未能皆成血泡者為毒氣彌盛而不斂急用豬尾膏則隨時結痂疕矣十形證輕重重者一齊並出密如蠶種稠密無縫身溫腹脹頭溫足冷皮膚色赤吐利五內七孔面目皆有瘡內黑點或如茱萸外白內黑灰白色半輕半重外黑內赤痘瘡夾疹輕變重痘出妄汗妄下誤服升麻湯大黃等藥不忌口過飽失飢食生冷飲酒多信巫不信醫犯房室犯穢觸輕者作三四次出大小不一等頭面胸腹稀少眼中無肥滿光澤裡外肥紅根窠紅順候春夏為順先發搐而後發瘡者生飲食如故大小便如常先發熱熱歇出痘逆候秋冬為逆春膿泡金剋木夏黑陷水剋火秋班火剋金冬疹土剋水便血乳食不化者死脾虛正出吐利風攻頤頷唇腫硬或胸高突面腫鼻陷目閉咬牙或鼻有黑氣肌肉黑面色青黑或因吐利內虛陷伏已出妄汗而成班爛或冒風邪成倒靨不起發也泄瀉不食瘡成餅搭燥渴小便澀聲啞臭爛不可近瘡盡爬破目閉黑暗矇昧無魂頭面腫足冷至膝不時努氣如用力大便狀瘡與肉色不分已出身熱足熱不解已出煩躁悶亂熱氣復入歸心心火自焚用導赤散合白虎或可救差後驚搐飲藥錯喉氣逆逐藥之鼻出也遍身瘡黑痘瘡焦黑其瘡青紫變壞歸腎惡候痘出而復不出或大泄而渴此因痘出而服冷藥逼勢毒在肺中故煩躁迷悶不食或大小便難皆惡候也已出譫語不止瘡帶白膿者其毒輕或紫黑色隱隱在肌肉裡者其毒重甚者五藏咽喉內有瘡其瘡不大小兼便澀出血而痛黑靨不生膿者死或見痞以藥解利而痘反沒者死宜急溫之乃愈瘡作白泡忽然伏入藏府漸變紫黑無膿日夜煩悶啼哭其症尤惡服化毒散其毒從手足心出乃差此是五死一生之候便血瘡爛無膿者死目閉腹脹口中作爛肉臭者不治大小便祕目閉聲啞肌肉黑者死又有胃熱發黃狀如橘色下利者死痘瘡可畏不食名渴渴飲不食益黃散白朮散戛齒噤牙能令陷伏是腎虛也增寒困倦令瘡陷入是脾虛也煩躁體熱搖頭者欲生風吐逆瀉泄食不化而出並痘後大便膿血瘡作黑陷內無膿血或作黑泡或生瘡迹作黑孔死大小便澀三黃丸癰塊壅腫痘毒變疳口臭蝕唇口鼻牙落者死喘急痰盛聲啞氣噎或正出或痘後有此症者多死咽藥食腸中鳴者死已上俱是危症首尾可畏也除此之外皆不妨內犯其一二者若飲食如舊雖困重醫治有可生之理如飲食減平日之半者死飲食如舊內犯其三四者亦死痘瘡不治症咽物時時噎喉中搶錯聲痰喘頭有汗腹脹氣虛鳴痘瘡欲出先青黑半在皮膚帶紫色昏沉默默又增寒困頓冥冥都不食心煩涎盛瀉膿頻體熱喘粗癰腫極渴吐戛牙時發戰毒灌咽喉聲啞咽全生方云一病未已一病復生五行勝復相乘其人必死痘瘡五不治癢塌寒戰咬牙渴不止喘渴不寧頂陷腹脹頭溫足冷悶亂飲水氣促泄瀉煩渴皆難治遍身腫毒大如雞子紫黑髮喘忽瀉鮮血或如死雞肝或如黑豆汁唇青黑縮咽喉腫閉口舌生黑白色瘡腹脹如鼓氣喘煩躁大熱發渴鼻內瘡紫黑色瘡出後通身忽腫如冬瓜氣喘急促兩耳口鼻俱黑四肢逆冷項忽出大汗手足身體俱冷如冰腎丸黑縮口吐腥臭氣皮外風面色青黑手足搐搦直視吐涎不醒作鴉聲手反被外風胃悶喉中涎響目閉多睡頭汗如珠一向大熱煩躁喘急服諸藥熱不退已上諸症多主危殆十一痘疹當分輕重治之病深藥淺不能去病病淺藥深真氣受弊觀其外黑裡白者輕外黑裡赤者微重外白里黑大重青乾黑陷昏睡汗出不止煩躁熱渴驚啼腹脹大小便閉者困也瘡中黑點如針孔者劇又有風邪搏於皮膚熱不得泄瘡變為癮疹皮膚瘙養者輕內先蘊熱外被風邪瘀血則赤班亦深甚者五內七竅皆有瘡用藥之法輕者宜勻氣令其自出半輕半重者宜解毒毒散則輕也重者宜利小便大重勢劇者當隨症慘泄熱氣衝心譫言妄語宜硃砂參苓之類蒸於肝則搐搦狀如驚癇宜防風羌活天麻全蠍南星之類蒸於脾則腹脹渴水目腫大便祕宜枳殼散橘麯山梔地黃之類蒸於肺則喘急渴水咳嗽鼻乾宜桑白皮馬兜鈴半夏之類毒氣歸腎黑靨倒入者急用豬尾膏活血散惟傷風傷寒變為痘疹是汗下失時之過辨曰余當究痘出之理血先至而氣後也血載毒出至表會氣氣交於血血會於氣氣尊於中血附於外痘始形焉氣始令焉血聽制焉於此足見氣血有君臣濟會之道然而氣血負毒出一步則內虛一步氣血負毒一日則內耗一日痘有陷塌攻剝之患而不可救實出於陽氣消礫有如缸油盡而燈燼不明田水竭而禾苗不秀是任位者不能順聽命之情故耳於此可見氣血交會之難何況投以發泄之劑而至內備虛耗乎然則如之何必須保元湯以保氣血保氣血以保生靈猶國家之固邦本余故得補益之旨之久矣又推及四時順者是毒聽命於榮衛也四時逆者是榮衛聽命於毒也又何春夏為順秋冬為逆哉余知久雨亢陽則難於痘也其時陰濕則天地之氣厄寒人之氣厄寒其時旱暵則天地之氣散逸人之氣亦散逸氣血因而自病則不能成痘之功也務必加以溫暖則陰濕自解暵旱自和解則抑氣伸焉和則逸氣收焉誠能變理人身之氣何患痘之不痊乎前人謂重變輕輕變重之症雖能之之不能格之余嘗究其自矣重變輕是任位之盡道也痘初出雖密氣血豐盛不失負載交會之情是任位者任之致聽命者聽之矣輕變重是聽命之不忠也痘初出雖稀氣血衰離有失負載交會之情是聽命者任之致任位者不得任矣審其榮衛之弱而變者則必有陷塌之患前人又謂大小不一等痘今人呼為茱萸妄立名色非止一端考諸方書亦無此説余嘗推及大小者是血載毒挾氣而馳有若噴唾雜然而散大者如珠小者如粟此理必然厥痘始終不能離乎痘之形色無乃出於氣血造化之機乎壞症不治譫語狂煩恍惚昏沉崩塌倒陷寒熱不灌漿辨曰痘有壞症而世無可治之術蓋氣血不得任其所任位其所位致使人身錯縱經行之道矣且人身有一小天地氣血有君臣之道五內百脈無非氣血所有榮衛相生如魚有水使氣和於上血附於下尊卑之道不失五內百脈固若金水湯又何崩塌倒陷之有如氣弱而不剛血逆而不順痘之君臣各失其政尚何人之五內有可全之理豫審氣血虧盈之妙理調之變之夫豈有壞之之患哉治痘不可使血過於氣何也蓋痘之崩陷是血過於盈也不能充滿光澤是氣過於虧也虧則血盈之勢愈昌必載毒上犯陽位於皮肉之間不發不解作寒作熱外剝百脈而不固內攻五藏而不及譫語無常狂煩不定實因氣之虧損而陷於陰一任血之所為矣亦或有妄施散泄之劑致傷元氣者或有益血過多致衛氣反虧者或峻投涼藥致氣寒伏者或肆用熱毒致氣散逸者或用以毒攻毒之法致中氣不守者或因原患肝有餘腎不足脾常怯之症者或醫不能詳究調燮而成此症者一皆氣之虧甚不能流行五內百脈以護其神陰陽反覆誠血之過惡也至此欲求其生而強之以藥可謂不識大體者矣觀斯症恍恍惚惚有若醉者欲飲不飲貪嗜之心無厭昏昏沉沉有如飢者欲食不食貪叨之心猶存此乃魂先散而魄未盡之狀何以得生痘瘡分人清濁就形氣上分勇怯又須分氣虛血虛爐灰白者靜者怯者作寒看焮發者燥者勇者作熱看氣虛者四君子加解毒藥血虛者四物湯加解毒藥酒炒芩連名解毒藥犀角大解痘毒劉氏曰犀角消毒發瘡神效鼠黏子連翹山楂甘草此四味乃始終必用之藥紫草能導大便使瘡發出而輕糯米能解毒發瘡辰砂制胎毒絲瓜連皮子燒存性為末湯調發痘瘡最妙或加紫草甘草調解活血調氣安表和中輕清消毒溫涼之劑二者得兼而已溫如當歸黃耆木香輩涼如前胡乾葛升麻輩佐以川芎芍藥枳殼桔梗羌活木通紫草甘草之屬則可以調適矣色淡者宜助血藥歸芎酒芍之類或加紅花白者屬氣虛補氣為主黑者屬血熱涼血為主中黑陷而外白並起得遲者則相兼而治初出之時色白者便用大補氣血參耆歸朮芎芍升麻葛根甘草木香丁香大便泄者加訶子肉豆蔻吐泄食少為裡虛用前大補氣血藥不吐泄能食為裡實裡實而補則結疒雍毒紅活綻突為表實不藥可也更用實表藥則潰爛不結痂疕灰白者屬表虛陷伏倒靨亦表虛或用燒人屎蜜水調服機按陷伏即倒靨血泡既成當結膿泡卻乃平塌不肯灌膿突起將欲成就卻紫色者屬熱用涼藥解其毒升麻葛根連翹桔梗芩連桂枝之類甚者犀角將靨時金白色如豆殼者蓋因初譫語煩躁狂渴飲水多者則後來靨不齊俗呼倒靨但服實表之藥消息大小二便大便祕利大便小便澀利小便古人謂紅點已見之時紅泡既成之際蓋謂此時熱氣盡出於表內藏無陽而里已虛故嚴加告誡切莫汗下並投涼藥殊不知當比屬熱症者多屬寒症者少若有煩躁悶亂懊憹顛倒足熱面赤唇乾鼻燥狂渴引飲於此不急投以涼藥則昏悶死在旦夕大便實者雖大黃亦無忌焉若屬於虛者其症多靜雖從緩治可漸而安王氏曰痘疹屬虛寒者延正至十數日後方死屬毒盛轉紫色者不過七八日蓋痘是胎毒自內出外二三日方出齊毒氣尚在內出至六日則當盡發於表七八九日成膿而結痂矣若毒氣不能盡出過六日毒反內入藏府故須於六日已前毒氣該出之時急服涼血解毒之藥以驅出之六日以後醫無及矣故其死最急若虛弱毒氣少者只是氣血不足不能灌膿成就故綿延日久而後死此虛實輕重之分也近時痘方多用陳文中木香散異功散殊不知彼立方時為運氣寒水司天又值時令嚴冬大寒為因寒氣鬱遏痘瘡不得紅綻故用辛熱之劑發其壅鬱今不分時令一概施治誤人多矣時值溫熱山野農家貧賤之人其或偶中也王氏曰痘瘡虛怯淡白色癢塌者此屬虛寒用陳氏方者率得生然氣血虛則送毒氣不出及不能成就故陳氏方亦千載祕訣也溫補之法既行而解毒之旨遂隱若發熱壯盛齊勇紅紫躁癢者此屬熱毒急宜涼血解毒概用陳氏溫補多不救矣辨曰宋錢氏仲陽所立小兒一科之鼻祖而繼之者陳氏文中也二家治法之精後世莫加焉雖然錢氏治痘用百祥丸則過於治矣後人不得其旨未免致折傷之陋陳氏用異功散亦過於治矣且太陰肺經氣以之為主焉痘得氣負之力而能外解何得反用木香令其肺氣蕩泄則烏乎有製毒之功又用丁香附子大熱之劑人之氣血既弱而徒以熱攻之是猶鐺中無水更加以薪則湯氣又安得而上蒸以腐熱其物哉或者錢陳之法多利於西北土厚風銛之地氣受必堅體稟必厚用此必中已上皆未可為傳世之要劑東南諸家或有宗而用之者是亦不知痘之理也初出之時須看胸前若稠密者急宜消毒飲加黃芩酒炒山楂紫草減食加人參已出者疏則無毒密則有毒宜涼藥解之王氏曰痘多者是毒氣多便宜解毒且多則恐氣血周貫不足隨後亦宜兼補藥以助成膿血先當少與化毒湯或絲瓜散十二痘疹治法痘瘡初出辨曰人非氣血不成形氣血非水穀不長養故人之身根乎內者曰神機根乎外者曰氣血氣血者神機之充神機者氣血之帥二者旋相交養此其生生之道者焉然天地之元氣大而難虧否而易泰吾人之元氣薄而易壞剝而難復此不易之理故人之性命惟系乎補之何如耳且痘毒客於百骸必賴氣血剋制之力始得存乎生命痘毒之發奔馳脈絡間血不縱其毒承載上行氣分不容其毒拘領逐散肌表斯毒於元氣無妨矣是以毒苟既盛使血氣足以領載則正能勝邪氣血一敗則邪反勝正中氣於焉不固神機於焉不守神門於焉不禁血無氣領毒反內攻嗚呼元氣至此直一線耳苟非保元湯內固外護毒之為害烏可勝言豫嘗痛峻藥者峻藥多熱毒其性趫猛其氣燥烈如異功散類兒服之後搜藏搗府一時駕毒並氣血沖達肌表雖得快於一時殊不知寇盜雖出內備已虛寧可保其寇不復入乎將見氣血受害真元愈耗一快之後百悔並來兒不死也何待愚故曰治痘宜補者即王者專行王道也雖若迂緩而自有益於久遠治痘用攻者即伯者務行伯道雖暫快利而必無補於治道也驗唇口可知痘吉凶口疳肺疒雍唇口者與五內相通能辨五味為飲食節送之門戶也故血氣之盛衰受毒之淺深觀於此足可以知內症之吉凶矣痘未出時宜紅活如常不宜燥烈乾紅如見黃白赤紫而不潤澤者或見氣粗熱盛舌白至唇濕處而胃爛者是皆不治之症矣又如唇上痘出相連諸痘未漿而此痘先已黃熟則其毒內攻已成使毒亦難成漿者尤為不治之症矣間有氣血下陷毒攻唇口糜爛成疳疳雖成矣若得黃白膿水出者此又差可治也又有色如干醬其肉臭爛一日爛一分則二日爛一寸名曰走馬疳者世無可治之方矣若彼痘未褪謝連唇口結乾紅渣滓頰紅唇紫之症此乃欲成肺癰治以解其毒清其肺熱此宜解毒湯加陳皮歸芍桔梗黃連甚則大連翹飲若又轉加痰喘作嗽以參蘇飲主之醫者工巧而此亦可治調解痘瘡初欲出時身熱鼻尖冷呵欠咳嗽面赤方是痘出之候宜服升麻葛根湯加山楂鼠黏子或鼠黏子湯惺惺散紫草飲子解利之其瘡稀疏而易愈此則里不至冷大便不至利氣實者可用之若痘已出尚有小熱小便不利者八正散導赤散出後或嗽吐食赤茯苓湯發表痘疹皆因內熱與外熱相合隨榮衛運於肌膚而成痘疹夫外熱者或感風感寒風熱驚熱皆外邪而生熱失治於治療邪氣實實則生熱故為外熱也是故或感風寒閉塞腠理而痘疹不出或出紅點或血泡其肌膚青白而惡寒鼻流清涕耳與陰皆熱宜與表散如正氣惺惺散活血散紅錦散紫草湯皆表散藥也身熱煩躁氣喘脈促不見班點其熱未退者以麻黃等湯發之若已出班點則止後服攻裡痘疹未出胃熱溫壯氣粗腹脹大小便赤澀睡中驚悸煩渴口乾脈沉大滑數比是毒盛而不能泄宜利毒丸下之里無滯氣榮衛升降痘自出矣溫里痘毒正盛因煩熱而食生冷或服涼藥過度以致或吐或瀉腹痛不食宜與溫里如理中丸益黃散五積散治中湯之類皆溫里藥也或稟受弱脾胃怯或食冷令兒手足逆冷脈息遲細大便溏小便清者炮乾薑炙甘草湯豆蔻丁香參朮丸可選用之此溫里令自出也或以胡荽酒灑之葡萄酒飲之又火煅人齒散酒調服之此皆內虛自利陷伏者可用之醫者不明裡寒不能運出法當溫之而反發表或外寒所伏不能發出法當表之而反攻裡此皆醫殺之也解毒痘瘡不出亦有瘟毒而不出者以地黃雄黃飲之不可過多多則反有損痘疹出遲調解一半血泡一半尚是紅點此毒氣發越未透必不能乳若大便如常者宜四聖散絲瓜散或理中湯發表蓋小兒熱毒在內又遇冬溫或春夏暄暖內外皆熱郁發腠理遂為痘疹始出先為紅點當此或遇天氣大寒肌膚閉密毒氣反伏而不出則身涼內燥面青而煩或譫言妄語宜用解肌表出之藥如紫草散猴黎酒以瘡毒未甚出也發散如活血散之類溫里有紅點方出於外或內虛或食冷或投冷藥宣泄致令藏府虛冷不食自利亦復陷而不出宜用溫里之藥如活血散益黃散參朮丸之類有因下利四肢厥逆腹脹咳逆此由裡寒氣不能出故也急宜薑附理中等藥溫之否則胃氣裡虛恐內陷也攻裡半出半未出大便不通喘急腹脹煩躁大渴譫語狂妄氣粗口熱稟賦壯實其脈沉實者乃里熱彌盛且微利之四順飲否則毒氣太盛昏悶而死半出半不出此毒氣半在裡而不出盡故也或盛出大便不通小便赤澀喘粗腹脹唇乾口燥引飲譫語者當急下之此由毒氣彌盛而內外皆熱若大便裡急後重當令大便潤過則內不燥自不裡急後重矣腹不脹者且利其小便或謂當下恐毒氣復入或謂當溫宜助胃陽運出大抵用藥或冷或熱或補或攻隨症輕重以救一時之急不可拘以常法又不可藥劑太過痘出未透宜四君子湯加黃耆紫草糯米元醫曰百病不可損其胃氣故多用四君子糯米等以助胃氣調解出遲者宜活血散人牙散以發之發之班未出者乳香豬心血丸出而不盡透者以豬血麝香塗手足心唇上最為要妙或以紫草散蛻殼散隨寒熱虛實投之有班點見齊血包結起遲者若便祕渴而腹脹宜勻氣解毒甚熱者宜利小便有正患痘疹中遇暑氣大作或煩渴咽痛或喘滿作渴此乃暑熱與瘡熱並遏壅滯而出不快宜白虎湯荊芥散有大小便祕氣壅遏而出不快宜紫草木通散有痘疹發而不出者鉤藤紫草散有氣澀出不快者滑石散取活竅也氣虛蛻齒散活血散有傷寒不語瘡疹不出幹人糞散有瘟毒既發痘疹不出者地黃豆豉散發表有遇天氣暴寒膚腠閉密寒氣結聚而出不快宜麻黃正氣之類疏利有紅班點出日數未盡以足底有班為出齊其內實而肌熱者宜疏利之痘出未透心煩狂躁氣喘妄語或見鬼者此熱盛也宜龍腦膏有痘出太盛內外熱氣壅遏血蓄結聚令兒能食腹脹不大便煩躁而渴手掌心有汗喘滿而出不快此由毒氣與心火貫注無陰氣以斂之也宜乳香豬血膏溫里痘疹隱隱不出熱蒸而為痘疹使內虛而無熱以應之故痘疹雖見則外無壅盛之氣而不得泄內又無由復入當此其人面青惡寒肌肉慢而不入精神昏倦令瘡似出而不得出者內虛寒也或身熱面赤大便利小便清有此症者但溫中進食則榮衛自復其痘隨多少而出矣若見瘡疹出遲不能溫里卻用發散豈知內無陽氣相應更發陽氣外出故瘡色白此為虛脫而益危殆血泡出甚亦令內虛虛而自利者宜溫里泄甚者至於薑附硫黃亦可用有瘡中煩躁飲冷過多使胃冷無以運行榮衛致中滿而出不快宜理中湯薑黃散活血散痘疹不出調解有榮衛虛不能出者惡寒面青白肌膚慢似出不出者是也當和榮衛如活血散之類有誤服表藥過多遍身成一片謂之班爛者宜安養之如六神七珍散內補散雙和湯暑天胃熱煩渴昏迷瘡出不快者白虎湯或五苓散去桂加辰砂用生地黃車前草麥門冬煎湯調下班點已見血泡期七日而結膿泡今一半尚為班點未全為血泡者緣瘡疹遇冬溫或春月陽氣乍暄小兒為暴熱運行內熱出外天之暴熱一退大抵四時寒暑從漸而深其非節之氣來暴而去速也小兒外盛而裡虛裡虛則無陽以應瘡疹故出遲令半為班點半為血泡當此必不能乳大便如常小便清白宜用半溫里半發表之藥如紫草蟬蛻芍藥葡萄酒以表之活血散人牙散以溫之小兒氣血虛弱或風邪穢毒沖觸使痘毒陷伏不出出而不勻宜內托散內托瘡毒使之盡出易收易靨痘疹已出不能遍勻前人治法透肌解毒而已使氣無壅遏則自然出勻用必勝散快毒丹令出快紫草飲胡荽酒自然勻順解表能為力有已出被風所感不能出或發熱或狂言或風搐或遍身青紫紋此當發散如惺惺散殭蠶散正出之時被天氣寒冷所折毒氣反伏而不出者其症精神昏冒面青發熱或譫言妄語宜解肌表出之藥如活血散調解發散參蘇飲治外為風寒所折內為飲食所傷內氣壅遏大小便閉者若出不快清便自調知其在表不在裡當微發散宜升麻葛根湯加味四聖散紫草飲子紫草木香湯紫草木通湯或快班散絲瓜湯解表攻裡瘡疹伏內不必出頭痛惡寒身有大熱口鼻熱咽乾痛口頰生瘡兩目如火耳尖手足指冷脈洪大作渴面赤心逆熱口臭此是伏陷之候先當去熱毒邪氣用大黃煮湯蕩滌其表熱表熱散則諸疾皆愈昧者用巴豆水銀輕粉但能去藏中驚涎積熱而已無去表熱之理反傷藏也溫里有胃虛不出者或吐或瀉不食可見也宜溫之理中湯或異功散有已出而服涼藥生冷致內虛沉伏不出者令瘡黑靨潮熱啼哭或白色腹脹口氣目閉四肢微厥者是也宜人齒散理中湯有正出盛服涼心藥沉伏在裡發寒戰靨伏者宜丁香豆蔻薑桂當歸附子有本虛少用藥大發之出得正盛忽然氣脫者此里本虛也如丹砂養氣理中益黃之類內虛甚則生寒寒則大便或溏或泄宜理中益黃丁香豆蔻之類以溫里里溫與肌膚相應血氣溫深方能蒸出不陷伏矣薰解有出甚被穢氣熏觸則成血片宜胡荽酒燒乳香論口大熱紅點未見之時此內外熱毒蘊蓄也或發表或攻裡隨症治之班點已見血泡將成此陽氣盡出於表內藏胃氣已虛矣不可發表不可攻裡大熱宜利小便小熱宜解毒發表則成班爛攻裡則內愈虛瘡毒乘虛入里變黑陷伏者有之膿泡既成已結痂疕此毒氣出盡熱氣已寒若有他症或發表或攻裡隨症治之辨曰夫痘內毒所感也風寒外邪所感也若痘出不快蓋因風寒橫塞阻絶無路可出故也痘未發之初以升麻湯和解湯量輕重治之既出之後不解痘不起發或熱不退以保元湯加薑桂主之及至行漿之次又未解不灌膿及熱不退當以保元湯加薑桂連服二次於前乃以水楊湯暖沃於後此湯大能滌去風寒內外相攻風寒易去痘毒豈有不發之理不可峻下解散發泄之劑皆傷氣血交會之機故毒內攻多不救也俗謂以毒攻毒辨曰痘之發系乎氣血也尚矣苟氣血盛則能歸附成漿而毒可解若氣血弱則無所乘負其毒而毒難痊所以有內剝不起有起而不員混有員混而不成漿有頂陷而不起發之惡症是皆氣血而不自任故也但人不悟其理以蟲魚腥膻毛血牙骨鱗角等毒藥投之發其中氣以毒攻毒理難並勝痘雖不得已而出少頃中氣歸復氣血不外旺矣藥氣少歇則其毒反攻於內其勢較烈再將何法以治哉即此可見氣血有乘載之效用藥有王道之大也間有百數兒中稍得一者特其兒之氣血本厚耳豈可以一例行之乎痘出太盛調解牛蒡甘草散一發便密如蠶種者合輕其表而涼其內連翹升麻湯痘出太盛面黃大便黑色煩喘躁渴或腹脹者此由當汗不得汗內畜瘀血宜犀角地黃湯痘出太盛躁渴者甘草散未出者亦可服出太盛者人參敗毒散犀角地黃湯一説人參敗毒散泄氣藥也犀角地黃湯涼血藥也氣壯者固宜泄氣怯者又須詳審血熱者固宜涼血若血虛胃弱又須斟酌痘出太盛有因毒氣太盛失於解利瘡中吐衄致瘡太盛其害尤速宜抱龍丸生犀汁小柴胡湯加紫草糯米生薑煎服一發便密如針頭形勢重者合輕其表而涼其內連翹升麻湯發表痘出太盛煩喘甚者麻黃黃芩湯痘出太盛煩喘咽痛而嗽者麻黃湯入麝香尤妙班點已發密重微喘欲飲水者有熱也用去風藥微發下之攻裡場痘出太盛喘促腹滿小便赤手足心並腋下有汗或亂言妄語大便不通宜四順飲小承氣湯下後諸症悉退不可再下辨曰淫火逆順必使道心為主人心聽命謂之順若恣情肆欲縱其火毒謂之逆毒受淺深則痘之稀稠可見矣蓋稀如匝豆則毒不能勝其氣血雖不治其邪自解間有氣血弱而為風寒所侵泄瀉所陷毒藥所傷者亦有可死之理焉痘雖稀而犯此數者亦須補其氣不治亦死稠如綴粟則氣血不能勝其毒其毒反勝火動生風鼓舞血氣血氣柔弱則無以當其邪表裡為之不順榮衛為之不調十二經絡百脈七竅皆為之壅塞如此豈得而療乎間有血氣勝其毒者其形員淨不連其色紅活不滯痘雖稠若形員不連紅活不滯尚可治也大如保元湯連進數服防其倒陷損爛癢塌斯為要法氣血虧盈辨曰痘之為症不可使氣血之有虧盈也蓋氣體天而常親乎上血體地而常親乎下氣有生血之功血無益氣之理是故氣不可虧虧則陽會不及而痘之員暈之形不成血不可盈盈則陰乘陽位而痘之倒陷之禍立至如此者則交會不足外剝內攻之大害不復有可拯矣治道必須益氣之虧引血而入血入氣盈盈則能制血之有血餘可以保合天和也陷伏倒靨內虛不能盡出者為陷伏外被風寒所逼或穢氣所觸不得出者為倒靨必有症相雜紅點見至數日而反不出此者此為毒氣陷伏其症危也調解場毒氣入藏不出者腦子豬血酒瘡子反入抵聖丸救生散玳瑁散化班散皆治熱毒盛毒氣倒靨者非治裡虛吐泄不食而倒靨者有因煩躁惡熱掀揭衣被或值天寒為冷氣所侵或為乳食所傷致瘡陷如石色白冰硬宜不換金正氣散調解散陷陷伏倒靨或煩躁大渴或大小便閉痘不起脹者人牙散活血散痘瘡正出內外毒氣壅遏毒氣復入於裡者當解毒宜犀角湯類陷入者加味四聖散更以胡荽酒厚傅其身薄傅其足噴其衣服並以厚綿蓋之若猶未也獨聖散入麝香老酒調劑或用木香煎湯調血泡出至七日當結濃窠痂疕今七日尚為血泡不結膿窠此由毒氣內外貫注血熱相摶必復入心昏悶而斃蓋血泡是毒氣正盛陽熱內外彌滿無陰以收之急以豬尾膏涼心血使陰氣感之必隨時結痂而愈矣紫金散如聖散蟬蛻甘草散豬血乳香丸木星飲紫草膏開花蘿蔔煎汁服此皆治倒陷可選用之有盛實者毒氣貫注咽中閉塞大便堅祕小便如血是郁毒不散反攻藏府故使凸而不起謂之倒靨若有此症豬尾膏化班湯犀角地黃湯犀角玳瑁湯可選用之則鬱毒散瘡自出矣古人以硃砂腦麝豬心血等涼心之藥治瘡是治其毒氣已出之後心熱毒氣倍常則用之也非治裡虛陷伏外感風寒倒靨而用之也如結膿窠痂疕內外有感冒而生病者此觸犯之過治之無異於前紅班時用藥也重解瘡疹正盛內外無寒熱虛實症候而瘡不出者此由不能禁忌觸冒穢氣房室則痘不出毒氣入心昏悶而死此亦倒靨者也瘡出後觸之令瘡黑爛痛如刀刮瘡痕經年黑色宜奪命膏發表場瘡疹正出坐臥當風風寒摶於肌膚必發熱惡寒頭痛鼻流清涕宜辛溫藥表散寒邪失此不治則榮衛受寒不解加寒戰喘悶而為倒靨毒氣內外有所感冒陷伏者急以麻黃湯主之白花蛇散橄欖核煮水服之無不立愈外被風寒所襲使肌膚閉密氣血盛實與風寒相摶於肌膚必身疼四肢微厥大小便閉班點不長或黑色或身生青紫瘡疹此為倒靨宜溫肌發散風寒如紫草蟬蛻陳皮葡萄人齒殭蠶荷葉之類溫散寒邪熱氣復行瘡自出矣紅點至足為出齊毒氣方出盡也紅點漸長如豆起於肌皮之上乃成血泡血泡七日當結膿窠痂疕於此或外被風寒所襲為倒靨或胃虛吐泄而陷伏者亦如前法治之攻裡有內實皮厚肉密難出毒氣不得宣泄至於硝黃龍膽乾葛大青梔子木通石膏而平安者此皆隨時變通不可執泥溫里始為班點毒氣蒸蘊內外皆熱數日熱甚蘊班毒於肌竅出於皮膚或胃虛而不能副榮衛者雖出而覆沒班暈白色或黑色此內虛無血氣以應之其人必不能食或大便自利小便不赤而青或倦或𠰠四肢微厥宜用辛溫之藥令其胃暖榮衛復溫自然出矣如理中湯活血散人齒散之類吐利甚者薑附硫桂亦可用有冷氣入胃冰伏致令毒氣倒進里者宜溫之胃愛散類內虛不能出者謂之陷伏必出而後沒瘡點白色或黑其瘡不發形見小點淡紅微白或白而微黃其人必不能食大便自利或吐或厥急宜救里理中湯異功散豆蔻丸痘疹熱發在表而里多虛若結膿痂必先得裡實則外方不陷伏且有稟氣弱而內虛冷痘疹出時大便自利懼其伏陷至於服薑附硫黃豆蔻鍾乳桂等以助之而平安者稟受氣怯因病食少以致脾胃虛弱因虛生寒因下利因利而內虛冷急用進飲食固藏府藥以溫之則食進手足溫痘當自出矣或者謂瘡是熱不敢用溫藥遂致倒靨者有矣痘瘡黑色辨曰五色者五行之精華也正則光而明衰則慘而暗五藏榮枯於此可見矣故痘毒之出於藏惟利乎明不利乎暗光明者氣血王也慘暗者氣血衰也氣位旺而血得其令氣位衰而血被其囚血非氣則毒不收氣非血則毒不化信乎痘毒必血氣而後可以終始其功且夫色之紅者毒始出也白者毒未解也黃者毒將解也干黃者毒盡解也灰白者血衰而氣滯也黑者毒滯而血乾也焦褐者氣血枯也如紅變白白變黃者生紅變紫紫變黑者死之兆也且毒出於五藏而非獨一藏前人言五藏各主一色斯言謬矣嘗究錢氏陳氏所論變黑歸腎此皆過於理也然五色固有之而又不載各藏治法但用辛熱解毒發泄之劑若此不過攻毒動氣之術耳痘果可以如一例治之哉須察形色之淺深辨邪正之善惡治必固氣以勝其毒斯為可也子曾試驗無失如此者豈有顛沛之理哉此係察也調解五藏蘊熱出於肌膚熱毒汗漫心熱壅搐而不收使外不得作膿結痂內不得毒氣消散宜用涼藥解毒利小便令毒氣漸消則愈失此不治則倒靨矣黑陷項強腹脹直視發搐喘急一切惡候宜周天散無比散楊氏曰獨聖散雖遍身黑而欲絶亦令暫蘇而瘡紅也但目閉無魂者不治毒盛黑色者山梔子湯宣毒膏黑瘡惡候無比散倍金散硃砂散人齒豬血散黑陷甚者亦用燒人屎遍身青紫紋乃熱邪蒸發或為暴寒折之外寒與內熱相拒而不得入內熱為外寒所閉而不得出毒氣壅於肌皮其痘如痣或青或紫年壯肌肉厚密亦有此症宜透肌散之類又方紫貝荷葉霜後貼冰者佳直殭蠶炒去系鼠黏子炒等分為末研胡荽汁酒和一錢米飲亦可痘瘡黑色如蚊蚤所齧痘瘡色活則如丹砂如雞冠若毒氣暴出瘀熱摶之則毒凝血滯變成黑靨其症最惡若大小便祕喘急煩躁腹脹宜山梔湯宣毒膏毒氣內攻紫黑色者宜豶豬尾血調腦子佳又曰黑陷二種因氣虛而毒氣不能盡出者酒炒黃耆酒紫草人參熏解因觸犯黑色奪命丹穢氣熏觸使欲出者不能出已出者班爛成片甚則瘡黑陷伏加以臭爛如刀剜悶亂而死急宜燒乳香以胡荽酒噀床帳仍挂胡荽以辟惡毒蟬蛻膏闢穢丹疏利熱毒入里黑陷者因瘡出不透心煩狂躁氣喘妄言如見鬼神大小便祕渴而能食此症為實宜豬尾膏利之攻裡場瘡乾黑陷身不大熱大小便澀是熱在內大黃湯下宣風散若身表大熱者表症未罷不宜下寒戰噤牙或身黃腫紫急用百祥丸下之黑陷者變壞歸腎也由蘊毒至重大小便閉腹脹其瘡黑紫干陷不結痂疕錢氏以百祥丸下之然此太峻當以宣風散代之為末蜜湯調下先黑糞次褐糞便服四君子湯良久糞黃瘡自發出瘡不黑謹勿下下後身溫欲飲水者可活如寒戰身冷汗出水穀不消耳尻反熱者死辨曰宋錢氏仲陽所立小兒一科之鼻祖治痘用百祥丸則過於治矣後人不得其旨未免致折傷之弊有曰痘屬陽以火用事其瘡青紫變黑耳尻反熱乃水勝土虧其症為逆下後身溫欲飲水者乃土旺水退故可治也仍復寒戰身冷耳尻反熱由水邪太盛土氣已敗雖泄亦不能去也泄後溫脾四君子加陳皮厚朴木香丁香乾薑為妙雖然瘡黑本為危症治之有方亦有幸而生者矣大抵黑陷發寒者為重不寒者輕發寒者乃脾土弱為腎水所勝若先溫土以制腎水決無黑陷發寒之理溫里妄下成黑陷者由痘根毒在裡妄下則毒氣深入土不勝水而成黑陷往往此症必先寒戰咬牙醫者早為之所故曰與其救痘瘡於黑陷之後莫若保脾土於未黑之先土旺勝水決無黑陷矣楊氏曰痘瘡發於肌肉陽明胃氣主之脾土一溫胃氣隨暢獨不可消已泄之腎乎此錢氏不刊之祕旨也黑陷大便自利腹脹者乃虛寒也當溫之不可下黑陷而泄膿血痂疕能食者為順此必舊服脾藥脾土不衰毒入腹而泄出也水穀不消及乳不化者為逆辨曰陷有五蓋陽始會氣至血附根窠既立而中陷者為因元氣不足不能續其後而然也蓋陰血雖有附氣之功而陽氣使無製毒之力以致陷而不滿生生之意絶矣且陷有五一曰黑陷二曰血陷三曰紫陷四曰白陷五曰灰陷黑陷者為初出少稀後出加密陽會陰之次陽氣弱不能續其初出血無氣養故枯萎而黑陷也血陷者血盛於氣氣弱不能拘領其毒久則變而為紫陷也紫陷者為氣愈虛血無氣畜毒之盛負載不前血亦為之難去也白陷者為氣不足久則變而為灰陷也灰陷者氣血衰敗而不榮也此等之陷一皆氣之虧損使然如折奇花少頃生氣既絶則憔悴不榮矣噫毒縱狼戾肆虐有生之正氣非藥之靈慧神功孰能裨補乾坤之大奈何灰紫二陷俱從自吉向凶傳變而來則難於施治矣痘疔變黑痘內有灰黑色陷頂者有瘡獨大者有瘡內臭氣者或黑疔綿者皆名痘疔以絳針撥開瘡口及其瘡血吐碗水中紅者可治黑者難醫用生珍珠為細末豌豆頭髮各燒灰濕胭脂生用四味和為一處銀簪撥開瘡口將藥點入即變紅活多致獲安辨曰痘初出有黑點子世皆謂之班疔痘而有此則不能宣發諸毒往往以針刺之納藥於中以待其發此亦劫術矣亦有渾身黑點者前人謂之變黑歸腎豫謂非也蓋血載毒上參陽位陽不足陰往棄之故也又血與氣交而不偶不能復歸本位為因元氣虛弱不能續其衛氣以制其血乃自失其政而然且血順氣而蓄氣不能蓄血亦為之不榮故致枯萎而黑此亦理之必然也凡痘初出稀少後更加密則氣亦因之而弱不能助其初出者血無領袖一旦壅寒幾何而不枯耶然痘出則各經俱動豈有腎不相干毒既歸腎便能究之又何有血載毒逆經而出之理此以保元湯加芎桂補提其氣氣旺則諸毒自發黑者亦將轉而為黃此乃王道之大也豫嘗留心於此屢試屢驗世醫不明其理竟以針刺致使氣血愈泄反因治而難救雖父母不知其可哀也夫又曰九日後發疔疔釘也毒參陽位聚而自成窠穴也蓋氣分弱而血分不密其毒性不能自散故聚結而成其形如氣固血盛則毒受制歸附豈有是耶結於四肢或小或大不近藏府雖抵穿筋骨者易治若結於頭而腹背逼近於內者其勢必致穿藏府難治如不穿者急治治不可加峻以保元湯加牛蒡子當歸荊芥助氣逐毒待毒液滿自釋也癢塌者於形色脈上分虛實實則脈有力氣壯虛則脈無力氣怯實癢如大便不通以大黃寒涼之藥下其結糞如輕者用蜂蜜水調滑石末以羽瘡上辨曰陽分氣居之地陰分者血居之地陽氣弱則陷於陰陰氣盛則乘於陽氣少虛則血進步血少虛則氣下凌此必然之理也癢塌者蓋因血上行氣分血味鹹醃螫皮肉爬破血流之故也然氣愈虛而愈癢癢之甚必氣陷而毒倒塌矣嘗以保元湯倍加黃耆以助表少芍藥以制血則癢自止矣或有食毒物而發中氣致津液外行發為水泡血泡氣勢虛甚水遺肉理澀滯難行不能進退作癢不已爬穿皮肉如湯火泡者此乃不治之症矣余治痘固里未嘗待血氣失政何癢塌之有十三痘疹兼證治法自汗初起時自汗不妨蓋濕熱薰蒸而然也吐瀉凡顯痘疹若自吐瀉慎勿亂治而多吉謂邪氣上下出也吐瀉當分冷熱緣熱毒方作之際必煩渴躁熱引飲或當風寒坐臥冷氣入胃故胃冷則吐脾冷則瀉脾胃皆虛則不食也宜治中益黃等以吐利止為度此屬冷也熱吐者手掌心並腋下熱而濈濈有汗發渴臉赤飲冷未能言渴者則飲乳不休乳滿胸臆不能消化吐出則射吐了又急欲乳是熱吐也若用燥藥則熱極生風害人多矣熱泄者小便赤澀而渴口燥咽乾宜用五苓散竹葉半夏湯泄瀉瘡疹泄多內耗津液氣血不榮其瘡雖是起發亦不靨若身溫腹脹咬牙喘渴者難治緣水穀去多津液枯竭而欲飲水不止者蕩散真氣故多死也速與木香散或異功散下利嘔逆者下利嘔逆者須兼他症視之兼有熱症者當作熱治宜五苓散輩寒者木香理中湯甘草乾薑湯痘發作時或藏氣虛脫或傷冷藥內虛毒入大腸泄如豆汁或便膿血或下黑汁顴顴赤如錢口內臭氣唇焦目閉其瘡內陷加腹脹者必死急用溫中使大便固祕瘡紅活亦死中求生也理中湯豆蔻丸吐瀉陷伏二者俱見為表裡俱虛宜大補氣血一兒六歲出痘身熱微渴自利或教用木香散加丁香十粒豫曰出遲固因自利而氣弱然察其所下皆臭滯蓋因熱蒸而下恐未必寒急止之已服一貼與黃連解毒湯加白朮解之近十貼利止痘亦出其後肌常微熱手足生疒雍又與涼劑補之一月而安驚搐小兒平居安樂素無驚症忽然發搐但無涎潮不惡風惟惡熱者痘疹也蓋毒氣始作未形見之間忽然發搐乃毒氣自心經而出痘疹必輕若無兼見重症不須服藥痘疹本熱熱能動心理之自然夫心火熱則肺金受克不能制肝肝風旺則脾土受克於中上下氣不循環五行之氣無以相制故心獨大熱氣擊動心神必神不安則發驚當此宜泄肝利小便泄肝則風去利小便則熱除風熱既定驚自愈矣人治大熱則利小便熱雖甚不能蘊蓄而為驚若以寒涼損心胃藥以冷之則其氣斂瘡何由出況中焦既冷上焦熱愈不降其熱尤甚常見小兒患此誤投寒藥至死者臨終則遍身班出遂致不救素問云痘瘡出於心驚搐亦出於心痘疹毒氣始作心火太盛則生風風則驚搐熱氣蒸盛所以為驚搐為煩躁為痛癢瘡瘍數症心所生者無一不備如始者毒氣蘊於心藏則驚悸搐此症似驚風用藥當作瘡疹防備之大抵瘡疹必兼他症相雜如咳嗽痰涎心神驚悸煩躁𠰠吐唇紅頰赤煩渴耳冷足冷脈數舌白有此數症醫者不察若作驚風治之而用銀粉腦麝青黛硃砂硝石等涼藥投之則心一涼而肌斂伏何由運出小兒忽然發驚必是痘疹毒氣內盛但以發散毒氣如惺惺散消毒散紅綿散升麻湯兼以快氣利小便祛風等藥與服雖未即效亦不至敗事待其熱氣出泄於肌膚心氣亦自定矣如有風寒與內熱相摶而驚者則各見其症治之亦如前法但加勻氣藥為妙痘疹未出毒氣內逼目瞪上竄啼叫如驚風者此瘡欲出之候誤認作驚治之必毒氣內畜而熱不泄亦乃死候咽喉腫痛由心胃有熱大腸祕結熱毒上攻咽乾腫痛兼口舌生瘡齒齦浮腫牙齒動搖身熱能食者宜甘露飲如聖湯欲涼去痰消毒散心煩者鼠黏子湯冬月老幼服之春夏不生瘡瘍喉痹水漿不下紫雪主之聲音不出口頰生瘡煩悶潮熱面赤者紫河車散若身壯熱大便堅實或口舌生瘡咽喉腫痛皆瘡之餘毒未盡宜四味射干鼠黏子湯痘疹已出熱滯咽喉生瘡懊悶氣喘煩渴多睡精神昏塞者透肌散已上諸症須藏府有熱者方可服之如上焦有熱小便清大便溏是藏府無熱別以清上溫下兼服不可一概治也喘滿氣壅麻黃黃芩湯胸腹脹滿枳殼桔梗湯二陳加枳殼湯痘出腹脹由毒氣已出而未盡又正熱或外傷於寒而內傷於冷也大抵痘瘡正作熱毒既盛必生煩渴或飲冷過多或妄投涼藥熱為冷所擊欲出不能冷熱相拒毒不發泄故令腹脹甚者氣喘發厥瘡瘢白無血色或變黑色多致不救急用溫中之藥則冷氣散而腹脹消矣如傷冷者必不能食大小便利時時下氣腹中虛鳴宜理中湯異功散毒氣陷伏入里者則痘疹出遲毒氣倒靨亦令腹脹宜用溫平解毒快氣之劑如人齒散活血散之類蓋毒氣伏入者必有熱症相雜或渴或煩躁或大小便祕澀或啼哭不止則陷伏黑靨症中俱備矣腹脹目閉口中如爛肉臭者不治身熱煩渴腹滿而喘大小便澀面赤悶絶大吐者當利小便不差者宣風散下之痘疹面青痘疹面黃體倦者脾也面青多怒者肝也喘嚏面浮而白者肺也面黑善恐而欠耳骫手足厥者腎也煩躁面赤者心也此五藏有五色常與寸口尺內相應其不相應者病也今痘疹屬心心主血痘以血為主面赤身熱煩躁驚悸乃心之形症為順今反面青乃色病不相應其症為逆更當察其外症以提防之熱者必生風大小便祕而燥渴也宜消風散虛者必下利不食四肢厥也宜理中湯異功散涕唾稠黏身熱鼻乾大便如常小便黃赤宜十六味人參清涼散身體壯熱經日不除別無他症宜六味柴胡麥門冬散熱退住服不愈七味人參白朮散腹中硬痛痘疹始發腹中有塊而痛若手足稍冷尻陰冷者是痘疹症不可作食積下之前人論腹痛有虛有實腸鳴自利者為虛為冷脹滿不大便者為實為熱是知肢冷腹痛大便自利蜷臥惡寒是冷痛也今身熱肢冷腹痛大便不通蓋熱毒在裡則熱甚而發厥伏熱深而痘瘡不能出宜以蟬蛻末水煎服之已出者亦服無害毒氣得泄則四肢溫暖腹痛自止矣一女傷寒但腹痛甚日夜啼哭手足厥冷漸至危殆此時天時痘災吾疑或是痘症遂取生豬血急用腦麝和灌一服得睡須臾痘出而安若非此方則夭橫矣又方化毒散若便血瘡壞無膿者死十四痘後諸證治法痘後解利須觀虛實解利是治有餘毒者無毒者但當隨宜安養之熱者必大便難咽乾而渴面赤而煩小便或赤有熱症者方可解利餘熱溫壯齒齦宣腫牙疼不能嚼物面赤而黃或煩甘露飲子槐花散肝藏餘毒不解叫怒不能睡臥者調肝散恐瘡入目淨心散稟受怯弱膿血瘡痂大虛榮衛坐立戰搖大便不祕小便不赤無諸熱症者宜胃愛散七寶散雙和散之類以安養之候乳食如故不畏風寒肌膚稍實稍有餘毒宜少少與解利藥可也痘後身熱大便難小便澀能食而渴宜四順飲升麻湯小便赤澀黃芩散胃中有熱胸中有邪氣而嘔面赤而渴大便祕或如常或下利色黃者黃連散煩喘小便不利燈心湯槐花散發渴飲水下血不止消毒散薄荷湯調下黃耆散牛蒡子散大便下血疼痛消毒飲熱留胃經嘔吐下利小柴胡加黃連山梔生地黃痘瘡餘熱在中口舌生瘡下部亦有瘡或下膿血宜黃連散三黃熟艾湯喉痛並嗽不已者麻黃湯加麝香服大便不通熱攻藏府眼並咽嚨腫塞口舌壞爛者以如聖湯紫河車散紫雪之類選用之咽乾甘桔湯口瘡牙腫甘露飲嘔吐胃主納食痘後嘔逆是有邪氣相干故使氣逆而吐也熱吐者心煩作渴小便赤澀手足心熱面赤居處喜冷引飲成痰膈中縱能食乳聚滿吐出如射又食又吐脈洪數者此熱吐也宜黃芩散五苓散人參竹葉湯石膏湯加陳皮薑黃汁服冷吐者不渴飲食與乳隨吃隨吐不化面青白手足冷大小便利此冷吐也宜理中湯益黃散發搐痛癢瘡瘍煩躁驚悸喜笑皆出於心五藏蘊熱為瘡熱則生風當其未出心火生肝風令兒發搐今痘出後又發搐者是餘毒未解故動肝風而發搐也宜導赤散化毒丹消毒飲柴胡湯三白湯之類散熱退風而已一症心熱留滯不去熱盛生風風火相摶其人喉中痰響目上視面赤引飲居處喜冷宜柴胡湯加生地黃抱龍丸輩一症痘後胃弱多食不能克化謂之食蒸發搐其人必面黃潮熱大便酸臭祕泄不調或吐利腹痛或脹有積宜紫霜丸下之大便祕硬四順飲痘後又發痘疹比初稍輕此亦餘毒未盡皆失解利之故毒氣留滯敗熱於肌間也解利亦當隨虛實而用藥一概妄投涼劑氣虛者反為大害不渴面青飲食少大便不祕體瘦無力皆虛症也此則不可利熱毒攻目夫熱則生風由火盛制金不能平木肝竅於目木勝肝旺則心火炎上而衝於目故痘疹之始最宜防備使之視井欲其觀深視遠得感陰氣則自運於目搽胭脂則欲涼散毒服鼠黏荊芥防風去其風敷白芥子末十兩足心則瘡不入眼使神水不被風毒熱壅之害得免睛脹凹凸聲喑之憂皆消目疾於未然也痘瘡入目心熱生肝風肝主目熱毒沖之故為目患宜涼肝丸密蒙花散服之秦皮散洗之瘡出正盛不令入目調肝散入目成翳瓜蔞散用大黃散貼之入目痛楚浮萍散入目昏暗金花散瘡入目里侵睛樺皮散赤脈侵睛羚羊角丸生翳者撥雲散翳障不見光明蟬花散威靈仙散風熱攻目者井泉散或食毒物睛突出外者仙靈皮散暴出腫痛苧麻子散患半年一年餘者蟬蛻散痘疹初出欲使不入耳目可噴胡荽酒於耳目邊或以黃柏末水調敷兩目又抱兒令自投菜豆七粒於井中皆令痘不入目也亦忌食醬醋五味牛雞鵝鴨並雞鴨卵及煮卵令氣襲目但令食淡不能淡者宜入少鹽痘後目翳此毒氣自里而達外治宜活血解毒而已活血不至於熱解毒不至於涼得其血活毒散則睛不壅血不鬱而免凹凸損陷之患矣似非點藥可取效也蓋點藥非毒則冷必相攻擊反以為害古人所不取也痘瘡蘊非常之熱郁發肌腠蒸之為痘疹順其熱則出而毒散但過於熱則又損目抑之以涼則為陷伏黑靨故善使陽不至虧盈陰不至潛伏調適中和而已苟為不然陽勝則熱盛而生風肝應於木無不害目者陰勝則土無燥氣腎水反勝為黑靨陷伏則夭傷者多矣痘疹護眼多用胭脂塗不如錢氏黃柏膏好從耳前眼皮面上並塗日三五度若用之早則頭面無痘用之遲縱使出亦稀通聖散治痘入目生翳白菊花緑豆皮穀精草去根各五錢為末每服一錢米泔一盞同乾柿一枚煎候米泔盡只吃乾柿一日三服食後一方加豬肝煮食肝又方將浮萍以竹篩盛水盆上曬乾為末隨兒大小每服一二錢以羊肝半具木石器內擂爛投水半盞濾取肝汁調服食後痘瘡傷眼必用山梔決明赤芍歸尾芩連防風連翹升麻桔梗作小劑末調服如眼無光過百日後血氣復自明痘瘡發熱時便用牛蒡子為末貼囟門可免眼疾痘後忽遍身青紫瘛瘲口噤痰響蓋痘瘡方愈氣血虛弱由節令八方不正之風中之故也宜蟬蛻一錢薑汁薄荷汁入酒數滴湯調服連進二三服得汗或作癮疹神效肌肉破裂便血癰癤大小便不通此皆熱毒之氣壅盛毒在腸中則血滲入腸為便血毒壅肢絡不行為癰癤為肌肉破裂若令大便利小便通則無此患矣宜犀角地黃湯升麻湯白虎湯紫雪便血牛黃散之類選用便膿血此痘後餘毒不解熱入於胃故令便血日夜無度腹痛啼叫宜牛黃散有渾身壯熱下利黃赤膿血者薤白散或胃風湯尤佳小便赤而煩導赤散或犀角地黃湯熱瀉者渴水心煩小便赤手掌心汗宜利小便五苓散去桂冷祕者胸滿吐清涎不能食面青瘦其症少又非暴病痘後大小便祕或便膿血此由痘後失於解利以致熱並小腸則小便不通熱並大腸則大便祕結重則便血如前後不通宜四順飲利小便五苓散導赤散便血犀角地黃湯黃連解毒湯三黃丸咳嗽脅痛飲食不下痘後咳嗽者由陽不降心火克肺金也脅之左右陰陽之道路氣之並行處今脅痛是氣不能升降也飲食不下者蓋呼吸升降之間脾受穀味今氣不能升降則脾不能運磨水穀此宜解毒毒去則真氣自育矣宜赤茯苓湯導心火利小腸小柴胡湯治咳嗽脅痛二和散調順陰陽則自愈矣一方小柴胡湯加牡蠣五味子桔梗枳殼赤茯苓痘後煩渴由心胃邪熱尚存也宜五苓散竹葉石膏湯痘後癰癤蓋因痘瘡既平失於解利餘毒大盛內不得入於藏府外不得出於皮膚聚而不散輕則結為癰癤重則頭項胸背手足肢節赤腫而成癰毒未成膿宜小柴胡湯倍加生地黃消毒飲之類多是實毒血熱所成分上下用藥一日不可緩已成膿必用涼血為主赤芍藥甘草節連翹桔梗上引用升麻葛根下引用檳榔牛膝助以貝母忍冬藤白芷瓜蔞之類陳氏謂因飲水過多濕傷脾胃以致肌肉虛津液衰少榮衛澀滯氣血凝結故身生癰腫此主寒濕而言所治亦木香散類機按癰已成膿宜早決之遲則膿卻內攻反生變症一説結疕之後見有癰毒便以消毒散升麻湯五香散連翹散犀角地黃湯皆可選用有稟受怯弱痘後面青不能飲食大小便自利肌體怠倦無熱者且與平調藥安養之令其裡實如大便祕發渴咳嗽驚叫小便澀可用前諸方解利之結核癰腫熱毒藏於肌膚榮衛為之壅遏則結核腫癤咽膈不利痰涎壅塞或為㾦㿔發於頸項手足肢節間甚則為癰毒亦令人咽膈不利痰涎壅塞咽乾眼赤腮項焮腫宜消毒散小柴胡湯最驗癰癤出膿不止體虛煩熱頭痛昏悶者黃耆散大便祕大黃散癰毒赤腫初生者燒雞毛水傅醋調伏龍肝傅地松胡荽傅地龍糞新水傅雞清調赤小豆末傅馬齒莧龍葵葉雞腸草藝臺葉景天葉皆可搗傅赤腫不散無頭出者馬鞭草傅痘風分氣血虛實以日子守之多帶氣血不足虛則黃耆為君助以生血活血之劑略佐以風藥實則白芍黃芩為君佐以白芷連翹續斷之類若屬寒陳氏方亦可用煩渴胸滿痘瘡將愈來熱雖退尚有餘熱在裡故也此皆失於解利熱毒不散所致宜黃連散燈心散黃芩散甘露散皆可選用疳蝕瘡毒痘瘡已靨未愈之間五藏未實肌肉尚虛血氣未得平復急被風邪摶於膚腠故津液澀滯而成疳蝕瘡也宜雄黃散綿蜜散久而不愈潰骨傷筋以致殺人牙疳痘後亡津液生疳蝕齒齦侵唇連口鼻齒落還傷生辨曰痘後餘熱者本虛熱也蓋痘毒一解則陰陽二分因而俱虛所謂火從虛發之義然其熱多發於午後但觀兩臉赤色乃其症也蓋虛盛則發熱熱盛則譫語狂煩若有此症不可作熱治即此虛陽動作亦必為之強陽前後以保元湯加黃連甚則大連翹飲主之切忌妄加他藥以致壞症而不可治矣此等痘症最惡預為調理否則日久或疳勞或眼目疳蝕咽啞風搐筋牽睡露白睛走馬牙疳諸疾皆自此始矣十五保元湯制旨制保元湯者有自來矣豫初時習痘一科初視驗吉凶人云有眼力猶今之村叟老嫗涉歷過多而能辨生死者也雖則有得於毫末而所以之故不知從何而來從何而可茅塞猶存及觀錢氏陳氏二家之説不一各執己見立方或寒或熱或補或下有所不同每見人用此者多被折傷然不知治各有旨又不知治各有時嗚呼惟人之生命為重然因求其生而反得其死因不敢效尤掩卷而不習及逾數年豫子丙患痘少稀熱極不發起發迎醫朱汝明觀之曰內虛故也用四君子湯加黃耆紫草一二服痘發足而解後鄰里盛行遂竊前方投施貧難屢驗漸得其間虛實之旨自揣不盡其術恐陷於人且得汝明先生之方與他法雖殊但過密盛者則不能成漿乾渴枯萎而死者有之因自咎不精之罪卻乃深究其義忘廢寢食一夕枕上蘧蘧然有得豫心蓋白朮燥濕茯苓淡滲其水故濕蒸之氣不行而使然也譬之鐺中湯氣上行則無物不腐矣後用減去應手如響始得氣血虧盈之理然又患其藥性太緩發之不盛恐越七日向表之限乃加官桂以助其力如東垣用補劑加薑附之義也而又得君臣佐使之法用之年久發無不中矣豫制此方如登太行履劍閣歷此險患不知其幾虛驚矣故以參耆甘草三品之神劑加贈保元以其功能起死也則東垣所用去虛火之聖藥今用之以治痘暗合其旨百世之下繼斯道於痘科誠先生濟世之心不泯矣豫又非汝明先生之傳亦何得而至此汝明字敞名也十六痘疹辨識痘疹不同痘瘡與膚疹有淺深之分府屬陽有熱則易出是以名膚疹膚疹一出便如沸瘡細泡出於皮膚之上一出而便沒以言膚疹在肌其所受氣淺故易出也藏為陰有熱則難出其為痘瘡在肌肉血脈間必先出紅斑而漸起如痘故名痘瘡其所受氣深以難出也暴熱而便出者必膚疹久熱而難出者必痘瘡疹自表而出於府則輕痘自里出於藏則重痘早晨渾身微熱午後大熱眼睛黃色兩脅下吸吸然動甚則發如驚風身有大熱手足逆冷此病屬藏以獨勝散發之以和平生津液藥潤之此是痘瘡切不可投涼藥恐水入大腸而痘不出則泄下如赤豆汁及朝出暮靨或腮頰赤色如掌大口內臭氣唇焦目閉腹脹此是痘毒入里由用利藥里毒陷入腸中或便膿或便赤汁此皆死候疹則早晨微熱午後亦大熱眼白赤色而不黃手足冷而吐逆此屬府為疹治法與治痘瘡同楊氏曰赤疹遇清涼而後消白疹遇溫暖而後減夾疹辨曰疹之毒與痘之毒不同蓋痘毒出於藏疹毒出於府然皆中於有生之淫火故其症雖異而其原則同爰孕成之初先有藏而後有府藏乃積受之地府乃傳送之所藏屬陰故其受毒為最深府屬陽故其受毒如差淺況疹毒受於運化之間是以其症之發也輕而易解若有不解乃為內實而外中風寒之盛也夫解痘疹之法痘當從外疹當從內此不易之常法如妊婦發疹熱極不易退內實之故也必下其胎胎下疹則隨熱內解而愈惟痘之發觸於天行時氣疹之發中於時氣風寒本非尋常併發者或有並行齊發之症此則所謂兩感矣愚謂痘出之際毒趍百竅被風寒封固腠理兼氣血壯盛濕蒸火熾擊動府毒而故並出是皆不順之候如痘稀疏可以升麻湯解之疹散痘出其熱自利則痘之輕重治止用乎常法若痘太盛其疹雖解殊不知氣血已受虧於前矣誠恐內氣弱血不能收斂其毒尚未可議其有生其症雖危亦宜用保元湯以期生此所謂蟲食木木盡蟲亦死也十七痘疹變症班爛病當發散而不發散則毒氣閉塞胸滿喘促悶亂不知人不當發散而強發散則熱毒隨陽出於肌竅皆為班瘡肌肉如爛故名班爛治宜調脾進食令大便不祕不利養榮衛以生肌解毒則無目赤咽痛口瘡吐衄等症解之不至於冷調養不至於熱最為良法班爛發膿痛甚者干黃土羅為細末敷之輕者芒硝豬膽汁調塗瘡上勿令動觸直候結疕自落不通臥席者用麥麩簟臥將息最佳有因發表過多致令陽氣在外內虛生寒藏府自利以致班爛急當救里如理中湯之類瘡當自愈班疹冬月溫暖而溫毒發班疹如錦文者又有冬月觸寒毒至春始發病初在表或已發汗或未發汗表症未罷而毒不散故發班以黑膏主之又有冬月溫暖人感乖戾非節之氣冬未即發至春或被寒折毒不得泄遇天暄暖毒氣始發則肌膚班爛癮疹如錦文咳嗽心悶嘔吐清汁葛根橘皮湯主之醫者不辨作胃寒治之轉加悶亂狀若驚癇遂生他疾楊氏曰毒氣入胃令人發班其症昏瞶關前脈大多見於胸腹輕則如疹子重則如錦紋紅者易治黑者難治疱瘡傷寒熱每在表不能作汗或當汗而不得汗暴熱灼於肌膚故發班疹泡瘡其泡色白瘡白頭瘭漿戴白膿者輕若紫色隱隱在肌肉裡者甚重此乃傷寒發泡小兒肌肉嬌嫩多病此也夾班班爛辨曰班者乃血之餘也苟血太過而氣不及則衛氣疏缺不能密護脈絡而致太過之血夾毒上浮矣然則夾毒而出非熱前熬血分烏得有是症耶陳氏所謂班疹者非也夫痘毒隨藏而出其發之勢殆如火藥最為迅疾然血亦乘其勢而發為班也如痘毒起齊內必虛矣內虛則班從內解不解以升麻湯加歸芍主之又有結痂後而發者餘毒熱盛煎熬肉分其班必爛此以解毒湯加歸芍防風盛則用大連翹飲爛處以生肌散敷之宜無不瘳矣若夾毒初出色赤如火乃毒滯不能宣發之故當以四順清涼飲一服如大便去一二次而班或退則血附氣位則以四君子加黃耆薑棗進之如大便不止可加肉豆蔻即止務須預先煎藥伺其班退血附與服防其損陷斯謂用藥得用兵之道不結膿窠痘瘡大熱則皮熱脈實大小便不利心熱燥渴氣滿而喘能食者此裡熱盛也恐生他病宜利小便使心火有所導引熱亦自退不必用冷藥也宜五苓散去桂其小熱不解則成大熱小熱而利小便則損氣但宜解毒而已如玳瑁湯消毒飲四聖散獨勝散安班散如聖散紫草湯犀角飲此雖不利小便其熱亦不能為害矣一説忌升麻湯葛根湯四順飲硝黃峻利之劑瘡疹伏熱在胃則中有所隔上則心火不能降故小便赤下則陰氣不能升故心腹脹滿董氏用紫草散發出其毒胃中熱散自然冰釋大熱利小便小熱但解毒此出錢氏謂大發表熱仍不退敵有利小便解毒之法未經發表而用此法恐失錢氏意也血泡既成當結膿窠而不結者乃內外熱極毒氣散漫無陰氣以斂之古方用宣風散導之磨生犀汁解之或用砂糖湯調飲之大小便閉澀津液燥而渴氣喘能食脈實不結膿窠痂疕恐生別症宜利小便使心火有所導引熱亦自退宜五苓散去桂若能食而喘腹脹妄語大便祕宜四順飲微利之痘出太盛為血泡血泡七日不結膿窠痂疕者由毒氣盛而內外貫注若不速解毒氣復入為倒靨宜豬尾膏看脈與外症審諦方可下之若能食而喘發渴腹脹昏睡譫語不大便者承氣湯川黃散下之若發熱作渴面赤悶亂大小便澀或大吐者當利其小便宜通關散痘已出定大便不通瘡出膿汁不幹牛黃丹辨曰痘至行漿之次而不含漿者當以保元湯加薑桂連服二次於前乃以水楊湯暖沃於後此湯火能滌去風寒內外相攻風寒易去痘毒豈有不發之理不可峻用解散發泄之劑皆傷氣血交會之機致毒內攻多不救也結膿窠後脈尚洪數能食大小便祕此里蘊熱毒宜微解之不結膿窠固有熱毒熾盛亦有氣血虛少察其形症虛實以為補泄為允當瘡壞無膿者死不結痂疕痘因熱而出又因熱甚不結痂疕是以內外蒸郁無陰氣以斂之故也古人以宣風散導之以生犀散解之使熱不壅脹必結痂疕矣血泡六七日當結痂疕而不結者此是毒氣盛實內外貫注故也宜用豬尾膏曾進一服隨時結痂疕神速特異因思人遇天氣寒暄不時脫著衣服必先呷冷水三口則不感冒是心涼則膚腠祕密風寒不能侵也用豬尾膏者以心屬火而燥居於上焦又加蘊熱毒氣並於心藏則毒氣內外貫注古人用豬尾血以血歸心引龍腦以涼之而行榮衛榮衛遇香則行遇臭則止故也痘瘡發如膿窠不肯作靨者調砂糖水與之多是爬了瘡子成一片去後來結瘢不好此瘡作膿窠毒氣已定而用之庶不為目害瘡未出盡切不可用蓋瘡初發而食甜物如棗柿糖蜜必使瘡入目也熱毒蘊而不散不結痂疕如大小便不通欲以藥下者須是微覺腹脹而喘按之腹微實手掌心並腋下有汗此有熱毒燥糞在裡宜下之川黃散膿泡不結痂疕者毒氣已出在表但解餘毒而已此是正痘瘡症無諸內外邪氣所感者也瘡痂不焦是內熱之氣薰於皮中故痂不焦也宜宣風散導之或生犀磨汁解之瘡疕不落明膠散班未出瀉下已出者內消黃明膠慢火炙為末溫酒調服必勝膏馬齒莧汁用煅成豬脂白蜜調煎成膏塗之痘痂起倍能食蓋痘既出於表則裡虛當食少今能食而里不虛為有熱本方用大黃丸下之亦須看脈為外症然後用若大小便祕喘滿面赤胃悶者則宜四順飲下之恐胃熱不去為口臭疤瘡如無別熱毒不必下也痘痂起胃虛不能食者宜調脾胃瘢痕若十三日痘痂已落瘡瘢猶黯或凹或凸肌肉尚嫩不可澡洗忌食炙煿五辛恐熱毒熏於肝膈眼生翳脹為兒終身之患宜二味穀精草散痘瘡既作其血肉為膿痂肌尚嫩未實恐惡氣有犯房中可燒乳香挂胡荽闢一切穢氣或坐臥當風則成瘢癬若膿泡出燒牛糞灰貼則速愈無瘢若膿汁不幹而能食者時與葡萄食之為其能利小便又令出快如穗之義鼻塞則摩頭以通之榮衛不和洗浴以利之肌理空疏粉末以蜜之此皆外治之法也欲無瘢痕在結膿痂時不可早爬去之出見風早則為癮疹肌膚凹凸宜硼砂散酒調服密陀僧水研塗蒺藜散胡粉散鷹屎白散馬齒莧散豬𦚠散羊𦚠鸕鷀散升麻水豆散黃柏散白蜜𩩅髓等青金散皆可痘瘢凹凸在結膿未成干疕爬去之不成疤痕矣辨症不須治惟眼目紅腫泄瀉不已二者宜用心焉辨曰痘之為症五藏百骸無不振動氣血無不虛弱如無雜症相仍尤宜戒其峻治治其雜症無拘日限痘則發於前七日結於後七日前後以十四日為限治者毋得急治其標而遂緩治其本故雜症一寸則痘症落後一丈雜症未痊痘已先斃矣治痘不可違限有如此者且痘之毒不解則一病不去痘毒一解則百病自痊醫之妙訣正在乎本上用力何在於一標哉雖初出有眼目紅腫而毒入於睛者固宜治之恐其睛突瞳陷也有瀉泄不已者亦宜治之恐其倒陷損塌也況治泄多用淡滲燥澀之劑若用之過則津液竭而血道閉矣治目多用發散涼血之劑使用之峻則氣血弱而毒倒陷矣用藥者如用兵其勝敗之機不意料哉古人所謂出於不得已而用之是誠良法也便膿血胃爛便血有內外感冒失於治療遂至此者其症最惡急用犀角地黃湯甘草散以散之散之漸蘇瘡出者活神昏胃悶者死伏熱在胃腹脹便赤者四聖散痘瘡正出下利黃赤膿血身熱大渴乃毒入腸宜解其毒使瘡出也薤白湯三黃熟艾湯加糯米甘草紫草水煎服痘瘡當出而不出由毒氣當散而不散蓋心主血而營於血瘡疹不出毒氣壅瘀於裡則為便血黑色故神昏倦而不醒其症最惡蛻殼散犀角地黃湯失血發泡鼻血口血大小便血瘡癤出血發為水泡哽氣呵欠噴嚏腹內雷鳴便氣下泄辨曰痘之發惟在氣不可弱亦不宜太盛太盛則恐傷其血其血之失也由氣盛攻毒為風邪閉塞清道熱盛火熾而氣與毒相挾交爭血不能勝以致錯經妄道渙散無統是皆氣盛於血也然則血之妄行有從口出有從鼻出有從大小便出有從陽瘡而出未發痘先已有瘡癤有從痘毒而出悉皆不治間有從鼻出者得生何也蓋為氣盛逐血血載毒奔行周身傳注督脈射關而出不犯其內故無害也至如口出及大小便出多死何也蓋因有犯於內而內有所傷也若陽瘡痘毒間出者則為走泄走泄多肉分空虛毒無定位故也及至發為泡者乃氣有餘而血不足故雖載毒終不能上附於氣使氣分獨盛有過本位致津液隨氣呼吸上極毒出之竇而發為水泡凡氣之過於盛者則噎哽氣也其所振所作如風之撓物無所不及無處不入七日前若作於膈則呵欠噴嚏其氣漸泄其痘不能起發員混七日後若入於腹則如雷鳴甚則飲水亦鳴或便氣下泄其痘尤不能成漿此皆氣之所為如此發泡者以保元湯加白朮山楂少潤水氣下行以平其氣治氣之法寧可補其不足不可虧其有餘蓋血弱一時不能補益故補氣之功易補血之功難蓋氣無形血有形血非五穀滋味精益其何能生化耶若過於益則又載毒從溢反為大逆矣治者更能安其氣位何患血之不歸附哉咬牙咬牙齒稿也乃血氣不營也方書多作熱治須兼他症參之咬牙喘渴者難治緣水穀去多津液枯渴而欲水不止者蕩散真氣故多死也速與木香散異功散寒戰鬥牙寒戰鬥牙譫語狂煩尋衣撮縫不省人事閉目無魂辨曰夫寒戰者陰凝於陽陽分虛則陰入氣道而𣯶毛象作寒不待疏而自戰也鬥牙者陽陷於陰陰分虛則陽入血道而兩齒相銼作聲不待力而自鬥也七日前見寒戰者表虛也鬥牙者內虛也七日後見寒戰者氣虛極也鬥牙者血虛極也氣虛者以保元湯加桂以溫陽分血虛者補元湯加芎歸以益陰分有獨寒戰者有獨鬥牙者以一體治之又有不省人事閉目無魂者譫語狂煩尋衣摸縫鬥牙不已者此皆氣血將盡毒伏於表之故也若此特有一縷不絶之氣而已而求欲生如覆水而欲再收胡可得哉喑聲不出喑聲不出口頰生瘡煩悶潮熱面赤者紫河車散痘已出而聲喑不出形氣俱病當清其肺宜涼膈散去硝黃咽啞水嗆痰唾稠黏辨曰心之氣舉擊出於肺而為聲其喉之竅若管籥古代通風鼓火器上的管子焉金受火制之使然也痘之發氣拘血載奔行四肢百脈因風邪沮塞腠理痰唾稠黏有礙氣道其毒不能盡行於肌表故成咽啞咽啞者痘出氣喉初甚細小不覺此已微露其機或用甘桔湯預防及其肌表之痘成漿內亦成漿其毒壅盛則氣出管籥窄狹所以氣舉擊出之聲不清也不清者肺金之受害也水嗆者毒壅會厭門也然是門飲食所進之處如飲湯水則毒礙其門不易進納而乃溢入氣喉氣喉者不受物之處故發為嗆也或進穀食而不嗆者蓋食有渣自能有其門而非如水之溢不犯氣道故也七日前聲啞咽嗆併為逆症七日之後而有者不待醫而自愈外痘結痂豈有內之不痊哉故先宜用甘桔湯服於已發未發之前蓋所以清其氣道不使毒之有犯此預治之法世不可去若待症成而治之可謂不通矣面目預腫面目預腫七日後腫者不治之辨曰其痘起發五六日之際有面目先腫光亮者是陽乘陰分毒不能發也何則血乃氣之本血有不足根本已失去矣氣乃血之標將見虛陽動作其氣妄行肉分區區不足之血亦何能乘載其毒而出耶七日之後傳經已足氣退毒陷陰陽各失其政尚何可治之有哉治者不可不預為之調攝氣血以保重之至此而欲強之以藥是亦求全於毀也渴有腹脹渴者有瀉渴者有足指冷渴者有驚悸渴者有身濕渴者有身熱面色㿠白渴者有寒戰渴不止者有氣急咬牙渴者有飲水轉渴不已者陳氏謂已上症皆非熱乃脾胃虛津液衰少故燥而渴也宜木香散多加下桂其中亦有熱者須兼他症參之庶不致誤辨曰三焦者水穀之道路也津液者又氣之精化而流通三焦以制火者也渴者為氣弱而津液枯竭也夫火非虛不發發而不解則津液不能上行以制火火乃炎上熏灼心脾肆其虛焰是以為之下陷華池為之乾涸故發為渴雖飲水至鬥亦莫能濟譬如沸釜徒以水制沸而不去其薪又何能止其沸哉此宜大補元氣以保元湯主之渴甚者加麥冬五味再不止以參苓白朮散一二服必止不可視如泛常致有癢塌之患也亦有陰虛火動而發渴也斯為難療蓋陰虛者血虛也血虛不能峻補與氣大有不同氣無形血有形無形者有神卒能旺於斯須有形者無神須當養於平素故氣虛可以補藥彌之血若一虛則痘瘡止有十四日之限耳尚何可以卒補而易旺哉此所以為難治也此固難治但六味地黃丸加肉桂五味乃治血虛作渴之聖藥用此亦或有中煩躁心經有熱則煩躁脾少津液則口燥咽乾而渴痘瘡已出未出皆宜用甘草散心煩發渴大便不通小便澀者通關散煩而喘悶燈草湯虛煩發躁而渴五苓散酒蒸黃連丸皆要藥也宜擇用之夏月大熱夾暑煩躁熱渴大便祕小便赤白虎加人參湯作膿泡而躁蓋心者主瘡瘍主煩燥當其作膿毒氣已出未得靜盡毒氣應心而煩躁作血泡而煩躁此熱毒欲散未散之際但解熱毒而已宜用黑豆煎湯放溫徐徐飲之煩躁睡臥不安身熱悸動者宜清心利小便若表不解身熱煩躁睡臥不安者宜水解散大便祕結煩躁不得眠者必腹脹手掌心並腋下有汗宜麻仁丸或煎黑豆湯徐徐飲之甚者青黛散以水調服津液枯少虛煩之氣晝夜不得眠者酸棗仁湯痰實壯熱胸中煩悶大便堅實臥則喘急宜五味前胡枳殼湯有小渴六味人參麥門冬散瘡出狂叫喘呼者乃藏府熱盛而無津液也無陰氣以和之致令陽毒獨盛故如此耳宜竹葉石膏湯更看大小便何部不利利之則愈解熱毒犀角地黃湯抱龍丸利大便四順飲利小便導赤散去桂五苓散晝夜啼哭小兒蘊熱毒為瘡疹因外未得出內不得散則神不安以致然耳當此察其蘊毒在表在裡若發熱渴水面赤小便赤宜微表令出可也若外無熱大便祕腹脹滿者當令大便通則無壅滯之氣榮衛通行神魂泰然瘡痘亦出快矣或以為心熱為聚痰不乳而用下藥涼藥反生多疾不乳不乳或吐或利面青目睛青黑色者為虛寒宜溫之大小便如常面赤而壅或渴或睡中驚或咬牙目白睛黃或赤氣喘身熱此實熱中滿不乳也目睛露白目日睛露白無魂者不治不省人事者亦不治辨曰元氣者先天之氣元命之主也衛氣者後天之氣生命之主也治痘必須察毒之淺深審衛氣之厚薄而施治之則無不當蓋先氣為衛氣之母母余必益其子子必賴穀氣之餘以養其母然後元氣得以固守人身衛氣得以長養氣血非生化化上合天地然所謂目睛露白者蓋由元氣虛損督脈縮促至睛上吊此非痘毒之故惟為毒去之後衛氣受虧不能顧其母故也治者多謂之風誠為謬矣無魂者不治失意志而不省人事者亦不治失意志即不省人事但只露睛而無他症者宜保元湯加陳黃米主之蓋人參固元黃耆固衛黃米又助胃氣以益其衛衛壯則能助其真元斯其症可療也惟七日睛露者毒上未解母氣即離子必凋弊其難治也必矣十八心鑑真言夫治痘以血氣為本故曰氣血者治痘之心鑑蓋氣居中君道也血附外臣道也氣正道尊而能員陽性能員氣之正也能拘不使血散能含待時而發能光澤氣足津液外旺也能逐不使毒勝也能黃功用包終始也能解氣正毒自解也血正順道而能附附其氣也能載載其毒也能制制其毒也能斂斂其毒也能紅舌和也能釋解其毒也此氣血各得其職也氣失其政則為熱為陷為癢為戰為塌為吐為瀉為狂煩為白為失色血失其政則為寒為壅為滯為譫語為紫為黑為褐此氣血各失其職也若氣不足則毒內攻若血不足則毒外剝治氣過於益則泡治血過於益則班此又治者之失於變理也譬之帷幄之眉運籌決勝其運用之妙存乎一心苟不以心鑑為證何以措其手足竊怪庸醫往往誤殺赤子假若一人害一兒以天下計則日害萬者有之尚有知者加功於豫之心鑑假如一人活一兒以天下計則日活萬者有之嗚呼盡信書不如無書惟醫尤其難著書其術庶乎有益於人苟不書其術則必誤於人矣豫敢以豫言為治痘之心鑑十九加減藥味品性製法凡觀症用藥必先量兒厚薄病熱淺深預將主方簇起然後加則加減則減加則不可過於本方減則不可失於本方不然脫去本真則不合制方伐病之旨矣豫因以己意加減合宜慣熟之劑並前後禁止常用暫用相便之法俱例於後以告行道者謹之且牛刀之技在熟輪梓之功在心亦人之機變何如雖吾之子不能盡吾之術不足與議但憫生之心切切自有不能已者也正品人參味甘氣溫升也陽也能益元氣而和中生津液而止渴治痘之聖藥非此莫能保固元氣之大本也取金井玉闌者佳每用三錢至五錢旋銼片用黃耆味甘氣溫升也陽也能固元氣而益腎溫分肉而實肌治痘用此賴其里托外負宜行王道非此勿言治取箭竿綿軟不油者佳每服五錢至七錢旋銼十日後痘發足未收蜜炙用甘草味甘平氣微溫陽也能解諸毒而泄火健脾胃而和中治痘賴以分理陰陽佐正君臣之道也內堅實者佳每用七分至一錢寒則炙熱則生常用加品官桂味辛熱浮也陽中之陽能祛風邪而實腠理和榮衛以固肌表治痘以其氣輕浮鼓舞上行能開榮血黃耆藉其力以達於表也取不厚不薄者佳每服五分至七分夏月三分至二分去柤皮切片七日後不用川芎味辛氣溫和也陽也能助清氣而升頭角佐參耆以助元陽治痘暫為引導上行之使取雀腦者佳每用五分至七分蒸潤切片七日後漿行足不用當歸味甘辛氣溫可升可降陽也治各有條能生血止血活血養血治痘賴以助血歸附氣位必加芍藥以佐之恐其活血流動毒無定位宜身大者佳每用一錢至二錢酒洗銼片焙乾暫用茯苓味甘淡性溫降也陽中之陰也能利竅而除濕止渴而生津治痘不可過用惟泄渴不斂而發水泡者不禁宜堅白大者佳每服二錢至一錢切薄片暫用白朮味甘氣溫可升可降陽也能利水道而除濕益脾胃而退熱治痘不宜過多非泄痢發水泡者不加漿毒溢盛不結痂者多加不禁宜細白堅者佳每用一錢至二錢洗去土切片焙乾暫用芍藥味酸平性寒可升可降陰也能健脾氣而補表止腹痛而收陰治痘血散不歸賴以收之而附氣也痘解不斂賴以收之而成功也宜白大者佳每用七分至一錢銼片七日前少用七日後不禁紫草味苦氣寒能補中氣而制諸邪行痘毒而利九竅不可過用宜紫茸染手者佳每用七分至一錢去土以手斷為米粒大五日後不用陳皮味苦辛氣溫可升可降陽也能和中而益脾消痰而泄氣治痘專以痰涎壅盛者氣盛發泡者加之不可過多宜紅薄者佳每用一錢至七分浸洗去白挫碎焙乾暫用五味子味辛苦鹹氣溫陰中之陽能降煩熱止渴生津補肺氣滋陰益腎治痘專止渴不可無宜北粗大潤黑者佳每用十四粒至七粒酒洗焙乾暫用麥門冬味苦甘平氣微寒陽中微陰能清肺火而止渴補心氣而生脈治痘專止渴清肺不可缺宜肥白者佳每用十二粒至七粒酒浸去心焙乾暫用木香味苦辛氣微溫降也陰中之陽能調氣而破堅和胃而闢毒治痘平氣止泄不可過用宜如枯骨黏牙者佳每用五分至三分旋銼暫用肉豆蔻味辛氣溫能止霍亂而溫中治積冷而止泄宜員大堅實者佳治痘瀉痢並水泄加此一時救急之味也每用五分至三分麵包煨熟去面銼碎暫用鼠黏子味辛氣溫平能潤肺而散氣利咽而退腫治痘專解餘毒不可缺宜飽滿新者佳每用二錢至一錢五分微炒四日後暫用荊芥穗味辛平氣溫陰中之陽能除風熱而消毒清肌表而利咽治痘專退壅腫而解餘熱不可無宜穗不宜莖香鮮者佳每服二錢至一錢五分洗淨銼十四日後暫用黃連味苦氣寒下也陰中之陽能泄心火而散痞燥胃濕而厚腸治痘專退餘熱毒解之後臉赤潮熱不可缺宜堅如金者佳每用七分至三分銼碎酒炒十四日後暫用山楂子味甘酸氣溫平陰中之陽能寬氣消食益脾去垢治痘專平氣解利參耆之滯間用可也宜赤大不蛀者佳每用二錢至一錢浸去核銼碎焙乾微炒十日後用糯米味甘氣溫升也陽也治痘專溫脾胃之中氣不使毒內攻制紫草之餘寒不使味傷胃宜粗大曬乾白者佳每服不過五十粒暫用陳黃米味甘氣溫升也陽也治痘專扶穀氣以助衛氣益其真氣而和胃氣宜多年倉庾中香黃者佳每用不過百粒至五十粒暫用生薑味辛氣溫升也陽也能止嘔和中助陽發表治痘不可缺以其功能助參之用也宜老而生者佳每用三片至一片以意加減常用乾者不用以上加減一十九味各分常用暫用七日前七日後宜用之劑告諸治者臨時對症加入主方不可過多滿意以亂陰陽之王政若去十九味而加之實害氣血之鳥喙也豫立治痘之法但固元氣為本氣固本立則毒不能外剝內攻何必深求異舉以害其正然則固氣之要非王道中之品藥孰敢當之保元湯人參二錢黃耆三錢甘草一錢用水鍾半薑一片煎至五分不拘時服保元湯即東垣所制黃耆湯見蘭室祕藏小兒方不越參耆甘草而已此藥性味甘溫專補中氣而能泄火故虛火非此不去也借之治痘以人參為君黃耆為臣甘草為佐上下相濟治雖異而道則同制方之義何其妙歟豫嘗討其藥性之功用黃耆能固表人參能固內甘草能解毒今用以治痘令其內固外護扶陽助氣則氣於焉而旺血於焉而附氣血無恙斯一身之真元可以保合而無壞亂矣區區痘毒藉此領載則何難出之有哉惟其有回生起死之功有轉危就安之力豫故僭改為保元湯也或云氣血與毒本同一途何專理氣而不理血是亦一偏之説也然痘之一症與他症不同症出陰分先動其血以血本盛故能載毒使血一弱則毒何能以自出哉雖然氣者又所以領載其血也若氣少餒則血亦無憑藉彼毒又將何從而載行於氣分耶故治痘當先治氣此不易之常也又云血弱不能載毒奈何曰毒譬則貨也血譬則船也貨若船敗也何以能負載耶可見血虛則內虛內虛則痘不得出血虛非倉卒可補故付之無可奈何又不觀妊婦出痘熱甚毒壅其胎必落落則血去氣陷毒復歸內寧逭其生歟此證血虛之驗或曰白朮茯苓亦能益氣世多用之今不加入何也曰苓術雖益氣而性皆利燥淡滲通利水道之劑苟或用之則津液隨水而下其濕潤生息之氣不行於上譬之地氣不蒸天氣不降尚何有天澤以救其物哉由是三焦為之枯燥氣脈為之壅塞漿毒為之不行毒遺皮內間外剝之患其可復救乎或曰桂辛物也痘出已熱之極矣今更用此誠恐重實之症生矣曰是知桂雖辛而不知辛能發散且如毒壅於皮肉間與脈絡之處苟非此劑推動其毒而毒能自散耶況此藥又能扶陽益氣充達周體翊助參耆之力而成傳功也夫我所謂治痘當固元氣者何也譬之用兵惟求主將無恙而已若主將不能勝任則其本先已搖矣雖有戈甲糧草將安施耶故曰保元湯者治痘之要劑用兵之要道也水楊湯專治痘出陷頂漿滯不行或為風寒久克者如初出及收斂時或癢塌破損者俱不宜水楊柳五斤淨洗春冬用枝秋夏用枝葉銼碎取長流水一大釜煎六七沸先將三分中一分置浴盆內手試不甚熱亦不可太溫先服宜用湯藥然後浴洗患者漸漸添湯不可太冷浴洗久許乃以紬紙捻燈照之纍纍然有起勢陷處暈暈有繇此漿影也漿必滿足如不滿又浴如前法若力弱者只浴洗頭面手足可也若不赤體不厭其多洗少壯亦然燈照如無起勢氣血敗則津液枯矣可以輟洗痘毒不能行漿乃陰陽二分氣澀血滯腠理固密精雖盛不易疏通所以有是患也須以水楊湯浴洗待其閉塞之處暖氣透逼發泄和暢鬱蒸氣血斯其漿可易成也浴洗之間燈影之下觀其痘不覺隨手而發功效豈淺淺哉且服藥不過助氣血以成功耳然藥力差緩頗難頓而達其手足面目若服藥後而更以此湯沃之其藥藉此升提可不充豁萬竅安得為風寒所阻而致構成大患耶且洗之法必添湯久沃使其暖透骨肉通理內外斯毒氣隨暖氣而發行漿貫滿豈不如反掌也耶披風寒尚可得而中乎嘗行醫村落見一老嫗抱患痘小兒以此湯沃之其痘頂陷初未漿足至次日又往觀之則漿行已滿矣至家數里轉行轉悟其理遂得殆即黃鐘一動而凍蟄啓戶東風一遂吹而堅冰解腹始雖二物竟則同一春也及觀群書皆無此法其後以是行之百發百中遂著為外治之法傳告於世少補救急之一助云升麻葛根湯古方三日前後用升麻葛根芍藥甘草上用水鍾半生薑三片煎至五分和解湯古方三日前後用升麻葛根芍藥甘草人參川芎防風羌活上用水鍾半生薑三片煎至五分四順清涼飲古方七日前用大黃當歸芍藥甘草上用水一鍾煎至五分解毒湯古方十四日前後用荊芥甘草鼠黏子上用水鍾半薑一片煎至五分大連翹飲古方十四日後用連翹梔子當歸芍藥防風荊芥鼠黏子滑石車前子瞿麥蟬蛻木通柴胡黃芩甘草上用水鍾半薑一片煎至五分參蘇飲古方十四日前後用紫蘇人參半夏茯苓陳皮甘草前胡桔梗枳殼乾葛上用水鍾半生薑二片煎至五分四君子湯古方不拘日例人參白朮茯苓甘草上煎法同前生脈散古方不拘日例人參麥門冬北五味上煎湯當茶服之止煩渴甘桔湯古方不拘日例甘草桔梗上煎如前法參茯白朮散古方不拘日例人參白朮茯苓甘草藿香木香乾葛上煎如前法四苓湯古方止水瀉豬苓澤瀉白朮茯苓上用水一鍾煎至四分不拘時服白螺散專治痘瘡不收白螺殼不拘多少古牆上取去土洗淨火煅存性為極細末瘡濕乾摻為妙金華散專治痘後肥瘡疳瘡疥癬能收水涼肌解毒黃丹黃柏黃耆黃連大黃輕粉麝香上細末濕瘡乾摻燥瘡用臘豬油熬化調敷生肌散專治疳蝕不斂並痘後膿血雜流不收等瘡地骨皮黃連五味子甘草黃柏上細末乾摻瘡上已上諸品名方乃前人所制治各有條今刪入痘科協助保元以收圖治非常之效是以升麻葛根湯和解湯四順清涼飲有開濟之能故用之於保元之前解毒湯大連翹飲參蘇飲有治平之能故用之於保元之後四君子湯生脈散甘桔湯參苓白朮散四苓湯有贊相之能故雜用之於保和之間蓋諸名方雖世用功多克濟但不能獨用於痘科豫取之不過翊運保全以濟陰陽虧盈之變是故治痘用藥之要始出之前宜開和解之門既出之後當塞走泄之路痂落已後清涼漸進毒去已盡補益宜疏如此者不得不録以備危難其他雖有奇方異味疊見諸氏之書似不合人身氣血中和之道録之何益二十順逆險三痘夫痘有順逆險三者古無有也愚意妄立之名何則順者吉之象也逆者凶之象也險者悔吝之象也治痘而執此三者於以觀形色驗吉凶將無施而不當矣蓋痘之一症始於見影終見結痂九十日之間而已苟非三者察形色之善惡定性命之吉凶尚有以決生死人將治所不當治不治所當治妄投湯劑被其在死者多矣是故吉不必治治則反凶凶不勞治治則無益至如險者則宜治矣治之則可以轉危就安豫視痘三十年見其順者多逆者少惟險者介乎其間要之氣血有厚薄之不一也夫氣血盛斯毒易解氣血損則毒難愈惟氣血少弱者雖毒不能頓解然生意未始不固乎其中故必加以補益扶持之功斯其悔吝無不平矣二十一痘出形症日期順逆險治例圖醫家之法有望聞問切四者所以審其症之由也惟痘利乎觀其形色淺深始終悉於此乎備矣且痘出乎淫火淫火人身之精華妄動之異名也以氣血而中以氣血而守以氣血而發以氣血而解信非氣血不能始終也治者要當留心於其間如有他法吾所不知也今以初出至痂落日斯形症吉凶之象也參以順逆險三法為則以明可治不可治之症畫為圖式凡圈內白者氣也圈外黑者血也圈內之圈者陷也圈外黑散者血不附也圈內黑圈者血乾也以次開列於後以備三法之階梯而圈下復著定形辨色症有體用之分投劑取功治有折中之妙其體用之應變折中效順而有數存焉學者又不可不留心於此一二日初出之象如栗於口鼻腮耳年壽之間先發三兩點淡紅潤色者順之兆也順者不治自愈為氣得其正血得其行其毒不得妄行肆其瘧也於天庭司空太陽印堂方廣之處先發者逆之兆也逆者不治為氣澀血滯致毒妄參陽位無以當其勢雖稠而紅潤澤成個者險也險者毒雖犯上其氣血未離憂虞之象未要加治俟其氣血交會之後以保元陽加桂主之謹防氣泄血散將無逮也若陰始交陽之際陽交陰會之初憂虞之象未可加治恐其藥性紊亂氣血交會之機若氣始定位血初歸附吉凶得失由此生焉苟失其正則宜治矣不然恐其氣血虧弱毒必內攻業是者當加調變氣尊血附乾坤道濟足以見陰陽治化收其全功矣二三日根窠員混氣之沖滿也氣之沖滿血必歸附為順順者不治自愈為氣血得其道也根窠無暈氣離血散為逆逆者氣血交會不足致毒乘機而犯內也根窠雖員而頂陷者血亦難聚為險險者為氣弱不能領袖其血也以保元湯加芎桂豈有不痊者哉四五日觀痘勢之形色則知氣血之壯弱受毒之淺深此治法之大要也其形尖員光澤大小不一等氣和血就順也順者自愈為氣歸血附各得其道而毒自釋其形綿密如蠶種黑陷乾紅紫泡者逆也逆而不治為氣血相離縱毒內攻也其形根窠雖起色不光潔生意猶在險也險而治為氣弱血盛勢雖挾毒犯上然得交會分明用保元湯加芍藥桂米助衛制榮斯為調攝之妙五六日氣盛血榮於內則發揚於外為順順者自愈為氣血豐厚毒受制也氣雖旺而血不歸附其色灰陷或紫陷或發為水泡癢塌為逆逆者不治為氣弱血衰致毒下陷而外剝也氣雖旺血不歸附不厚其色光白不榮為險險者易治為氣盈血弱不及歸附用保元湯加木香歸芎助血歸附氣位以全中和之道也五六日氣盈血附其毒自化化則成漿順也順者不治自愈為氣血得中其毒自解也氣陷血衰其毒內伏伏則不成漿逆也逆者不治為氣血相離不能製毒而外剝也氣交不旺血雖歸附不能成漿險也險者須急治之為氣血少寒不能振作急投保元湯加桂米助其成漿而收濟惠之功也七八日氣旺血附其毒化漿順也順則不煩治而自愈為氣旺拘血化毒之故也氣血乖離其毒不化漿逆也逆則難治為氣血不及不能振作以制其毒以發疤發疔者可生外剝內傷者必死其氣血少緩毒雖化而漿不滿險也險則可治為氣血有礙不能大振以保元湯加桂米發揚助漿斯可以保全矣八九日漿足氣血之功成矣氣血功成生命定矣如無他症順而也已漿不足者氣血盡矣氣血盡而大命臨之逆也漿不沖滿血附線血氣弱而險也以保元湯加薑米以助其氣而駕其血斯漿成也十一二日血盡毒解氣調漿足此生生自然之理也為順或血淡而漿薄或血凝而漿滯以見氣虧而毒不解為逆血盡漿足濕潤不斂者內虛也為險以保元湯加苓術助其收斂而結痂也十三四日氣血歸本毒既殄滅漿老結痂順也毒未脫形諸邪並作雖云結痂此其逆也毒雖盡解漿老結痂之際或有雜症相仍以保元湯隨症加減不可峻用寒涼大熱之劑恐致內損之患也十四五六日氣血功成痂落而無他症順之徵也痂未易落寒戰咬牙譫語狂煩疔腫作者無可生路逆之兆也痂落潮熱唇紅口渴不食者險之勢也以四君子加陳皮山楂黃連渴甚加參苓白朮散不解以大連翹飲去黃芩病去之後多有內損或餘毒未解此則尤難治也氣血獨勝受傷圖痘之初發陰陽交會不得其一則諸惡症生矣蓋氣血不能勝毒甚至滅亡得其生者百有一焉豫嘗闖其痘之惡症七日前後為陷為泡為疤為疔為癢塌為倒陷如此者有因毒勝而不治有因毒勝而自痊難於知識療理惟其陽毒內潰萌藥於表裡受傷之初又非血氣能勝其所勝而救其危也故另立治法圖式開陳於後尚冀治是者當加慎密七日前後五陷者氣不足也氣不足不能收血而毒不能成漿蓋氣不勝毒故也七日前後見此宜治以保元湯加芎桂糯米溫胃助氣又以水楊湯沃洗之血不榮加歸至十一三日方漿足者亦有之如血氣光澤有起勢者亦不可過於治也深恐滿而過盛反瘧百骸或血如死灰漿不滿足其血雖附不榮而兼內症者不可保矣七日前後倒陷者氣血衰也七日後根窠發足勢行之次因瀉氣陷毒即隨氣血而反陷也如血不走歸附鮮明護衛之力猶在治必有可拯之理其血不顧亦必挾毒攻內禍復起於蕭牆豈可救乎急以保元湯加參朮肉豆蔻渴以參苓白朮散人有峻用發泄毒劑致傷元氣而氣血隨毒氣反陷伏者有之用豫保元湯豈有是哉七日前陽毒者凡瘡也或瘡未痊及初結瘢處肉分必虛毒受氣血相擊周流百脈必趨虛處而出也蓋陽瘡陰毒混雜一堂反勝諸毒而名之也其毒濕潤者為氣血俱盛而諸毒易成漿也其毒枯燥乾紅氣血俱弱毒與諸瘡相抗而俱不成漿也治法同彼頂陷如枯轉潤紅變白其漿自溢於此可見治者之功效也七日後發疤者陽毒也痘之毒並聚一處而假其名也蓋氣血不能拘收乘載其毒使氣弱血盛陽分空虛血則載毒傳注四肢合處合者海也曲池委中是也毒不成漿七日前後發者宜縱之發其毒並從此而出也若治其毒必隨痘而散內攻藏府祕無可生之理如痘毒已解血氣豐盛宜解散其餘毒以保元湯加解毒湯為妙九日後發疔毒參陽位聚而自成窠穴也蓋氣位弱而血分不密其毒性不能自散放聚結而成其形如氣固血盛則毒受制歸附豈有是耶結於四股或小或大不近藏府雖抵穿筋骨者易治結於頭面腹背逼於內者其勢必攻穿藏府難治不穿者急治治不可加峻以保元湯加牛蒡子當歸荊芥助氣逐毒待毒液滿自釋也七日前內潰者胃爛也蓋因風寒所中腠理固密陰陽二分壅塞不通其毒內攻氣既不能拘血血又不能載毒藏府之間毒火炮熾則潰而成膿口舌皆白是其驗也如此克害生靈何其慘毒識者知痘毒未出之時或有風寒阻塞氣粗熱盛身必戰動腹肚急疼謹此患以和解湯升麻湯逐散寒邪開泄腠理縱毒而出豈有是症者哉痘治附方附方總一百五十三道皆前諸論中之所載也以魏君所定十六方觀之則一百五十三方似皆無所用矣今猶附之篇末意欲輯為全書有論無方非所以廣見聞也且臨症施治亦有便於檢閲免致為其所惑焉一初生服生地黃汁仲景云孩兒初生下時用生地黃汁點在兒口中即下黑糞終身不害痘疹二冬溫服生油劑小兒藏府伏於熱毒未成瘡疹四肢微覺有熱食物似減頭髮干立或時額多微熱用生油一小盞以溫水一小盞旋傾入油盞內以杖子打攪水盡更打令勻如蜜即止夜臥時百日一晬至三歲每服二蜆殼五歲至七歲三蜆殼八歲至十五歲服半合大人一合至二合量大小增減服後良久令臥少時服三五服大小便利四肢熱退瘡痘不生也但瘡痘已出不可服惟服和平藥解其大熱慮熱毒太盛也三冬溫服三豆飲子凡有時行瘟毒天行瘡痘者宜預服之黑豆緑豆赤小豆各半升甘草一兩用水九升煮豆熟為度逐日空心任意飲之七日後瘡必發快冬月溫暖小兒必發瘡痘宜預服之四茜根汁治時行瘟毒痘瘡正發預煎汁入酒飲之則不患瘡痘纍用甚應本草云茜味苦治一切血病痔瘻癰癤排膿五葛根散治天行熱氣欲發痘瘡壯熱作疼宜此解肌出汗葛根場麻黃各一兩石膏二兩黃芩芍藥桂枝甘草各半兩上為粗末每服四錢水一盞煎至半盞溫服取少汗若先自汗者去麻黃六樺皮湯治傷寒時氣豌豆瘡毒樺皮銼水煎溫服取汗樺皮味苦平無毒治肌熱黃疸時熱毒瘡癰腫及乳癰初作腫硬七必勝散治瘡泡出未能勻遍此藥透肌解毒或未及利而瘡毒已先發宜此服之牛蒡子不限多少炒熱杵細末每服一錢入荊芥二穗水一盞同煎至七分溫服如瘡疹已出服尤妙本草牛蒡子通十二經則瘡疹出齊無阻矣又云癰未破服一枚能出癰頭故出而未透勻者宜之八涼驚丸治瘡疹五藏皆見木勝土木歸心預防發癇龍膽草場防風青黛各三錢鉤藤二錢牛黃麝香各一黃連五分龍腦一錢上同研末麵糊丸如粟米大每服三五丸至一二十丸煎金銀湯送下溫服九栝蔞散治癍生於心心生熱熱生風風屬肝二藏相搏風火相爭故發搐也用此瀉心肝補其母栝蔞根白甘遂各二錢上同慢火炒焦黃研勻每服一字煎射香薄荷湯調下無時十升麻湯治大人小兒時氣瘟疫頭痛足冷脈數發熱肢體煩疼及瘡疹疑二之間或未經解利而瘡毒已發又云瘡疹大便如常者並宜服之升麻苦寒無毒主解百毒瘡痘亦毒也葛根性平治消渴大熱解肌發表開腠理治頭痛大抵瘡疹是蘊熱毒葛根解熱升麻去毒且二藥皆治伏熱動心恍惚驚悸煩躁芍藥治時行寒熱又活血俾使瘡疹易出又利小便瘡疹有大熱者利小便也用甘草調和之且瘡疹渴燥甚者亦用炙甘草四者為治瘡疹之要藥也是瘡疹服之則毒減而愈矣若傷風傷寒傷食驚搐兼患痘疹而稟氣怯者皆發虛熱而非實熱若服之反以為害但有壯熱面青目白睛不黃赤大便不祕小便清者皆不可服里無蘊熱故也此治瘡未發前瘡愈之後服之消毒非正出時服升麻葛根芍藥甘草等分為粗末每服二錢水一盞煎至半盞去滓溫服無時亦可為細末湯調服身心煩熱則溫服寒多則熱服十一惺惺散大抵渾身壯熱必由風熱瘡疹傷寒時氣且先與此也其頭痛目澀鼻流清涕者用細辛喘粗者用桔梗人參多睡者用茯苓恐傷寒時氣胃氣弱者用白朮風熱瘡疹用栝蔞根栝蔞根苦寒治身熱煩滿大熱除腸中痼熱燥渴熱而胸痹不下乳皆攻其熱也故非裡寒者可用裡寒者身雖大熱不渴大便反利小便不赤面青目白睛不黃赤其中雖有白朮之溫終非虛熱者所宜人之藏府寒則寒藥先效熱藥未必能制之熱則熱藥先效寒藥亦莫能制之此勢之自然也用藥豈得不辨表裡冷熱小兒傷風壯熱當先服此大效如壯熱未退切不可與通利大便及涼藥恐是瘡疹反有誤矣若桔梗細辛人參甘草炙栝蔞根白茯苓白朮各等分為細末每服一錢水一盞薄荷二葉同煎至三分去柤溫服要和氣人薑煎服無時身雖壯熱大便自利者不可服十二荊芥散治麻子兼瘙癢或癮疹大便自過用荊芥少許研爛以新井水將帛濾過入麻油一滴打勻令飲之便不悶亂麻痘已出用黃蠟煎牛皮膠水飲則安荊芥治血風麻子是疹子常言風瘙癮疹皆出於皮膚其毒輕而浮用麻油取其滑竅黃蠟煎牛膠水滋血行榮衛榮衛既順麻疹出矣一方加薄荷十三羌活散解熱散毒治風壅欲作痘疹者羌活獨活川芎桔梗蟬退前胡柴胡地骨皮甘草炙栝蔞天麻炙荊芥防風各等分為細末每服一錢水三分盞薄荷三葉煎至二分溫服量大小加減藥水此治風治寒治驚下疾涼脾治血熱透肌但屬實熱無不治之或稟受弱脾胃弱里無熱者不可輕用十四奪命散瘡疹已發未發並宜服之出痘疹熱毒勢甚者服之解蘊熱利小便痘疹初發氣盛亦宜服升麻糯米甘草紫草各半兩木通二錢半上銼為散每服一大錢水七分煎四分去滓溫服十五牛蒡散涼風解毒小兒冬有非即之暖及春月天氣暄暖或肥甘之過或重衣溫厚傷皮膚害血脈瘡瘍發黃致生多疾宜常預服之牛蒡子炒為末水煎一盞服之十六葛根橘皮湯治冬溫未即病春被積寒所折不得發至夏熱其寒得解冬溫始發肌肉班爛癮疹如錦紋而咳心悶但嘔吐清汁葛根橘皮去白杏仁去皮尖知母黃芩麻黃去節甘草炙各等分銼散每服炒三錢水一盞同煎半盞去滓溫服無時十七薄荷散小兒稟受雄實才覺是瘡若毒氣甚者宜服之薄荷葉一兩麻黃去節甘草炙半兩為細末每服三錢水一中盞棗二枚薑三片同煎至六分去柤日三兩次溫服此方服之汗出即服調中散服後若作寒熱脈反遲者進脫齒散以溫之詳此非下藥也實者服之未必安虛者服之必危殆十八獨聖散又名牛蒡殭蠶散小兒發瘡早微熱晚大熱目黃脅動手冷發甚如驚者牛蒡子半兩白殭蠶一分為粗末每服一大錢水六分盞紫草二七寸同煎至四分盞連進三服其痘便出牛蒡子出癰透肌白殭蠶治遍身癮疹疼痛成瘡為末酒調服之立瘥紫草能利竅瘡疹無虛寒症者服之立出十九抱龍丸治小兒一切風熱中暑驚悸瘡疹欲出多睡咳嗽痰盛面赤手足冷溫壯睡中驚搐不寧脈洪數頭痛南星取里白者為末用臘月黃牛膽汁和為劑卻入膽中令乾再為末半斤徑十足天竺黃二兩硃砂二錢研水飛雄黃半兩水飛麝香一錢牛黃一字同研極細滴水和丸如雞頭實大二歲兒竹葉薄荷湯化下一丸無時錢氏云因驚而生熱用藥發散熱入於表故表熱而生班宜服之紫草膏治麻痘不快紫草白附子各一錢麻黃去節甘草各二錢全蠍十個殭蠶十個炒為末用蜜一兩酒半盞入紫草煎數沸旋旋和入前藥丸如皂子每服一粒用紫草煎湯化下續用黃耆散調治此上等藥也紫草膏治瘡痘兼此藥治驚癇風疾又治瘡痘出不快如瘡初症似傷風傷寒驚風疑二之間服之皆有主治不至敗事醫家常蓄為妙二十紅綿散一名天麻散天麻荊芥各一分麻黃去節甘草炙各二錢全蠍七個全者為末每服一錢水半盞薄荷二葉酒四五滴煎二三沸帶熱服之如疹未出再進一服相次又進一服若是傷風服亦不妨大抵身有大熱面赤氣粗無汗為表未解也可服之此藥以天麻麻黃為主治有汗不得服麻黃腠理已開不宜便發汗也若有汗而熱者則惺惺散為和解之藥故仲景論表症有發汗者有和解者有調和榮衛者今有汗而熱則和解為宜如虛而熱者則宜調榮衛如和中散之類是也此藥荊芥主寒熱鼠瘻瘰癧生瘡下瘀血天麻治諸毒惡氣皮膚壅滿熱毒癰腫全蠍治諸風癮疹筋脈諸風小兒驚風其荊芥天麻全蠍皆性平治瘡理血故宜於瘡痘也二十一五積散治傷寒寒疫內傷生冷者瘡痘本蘊熱毒小兒熱盛渴則飲冷熱則當風致被風寒所伏寒熱相搏面青發熱心煩自利宜此散其內外寒毒然後熱氣上行或汗或瘡痘或癮疹皆愈矣方見寒門二十二麻黃湯主瘡疹煩喘甚者麻黃去節杏仁去皮尖甘草桑白皮蜜炙上銼為散每藥一錢用水七分盞同煎至四分盞去柤溫服若脈數熱未退者入竹瀝少許咽喉痛或嗽者煎熟入麝香少許服二十三紫草飲子治小兒瘡疹三四日隱隱在肌膚而未出及瘡出遲蓋紫草通水道去心腹邪氣內除積熱又能利竅使瘡易出紫草二兩細銼以百沸湯一大盞沃以物合定勿令泄氣量兒大小溫溫服雖瘡出亦輕二十四發灰飲治班瘡豌豆古方以亂髮治下腫骨疽小兒熱瘡痰熱諸般血病發木血之餘今治諸血症從其類也頭髮燒灰存性飲調服之二十五牛蒡甘草散治麻痘初作服此則稀牛蒡子麩炒一兩甘草炙一錢為細末每服一字或二字胡荽煎湯調服無時二十六兔肉醬用臘月兔肉作醬食去痘瘡兔肉平寒涼血故也兼臘兔毛煎湯洗痘瘡及兔毛傅良兔腦主凍瘡兔骨醋磨傅久疥兔毛灰主炙瘡兔頭皮主鬼疰毒氣在皮膚如針刺者又主鼠瘻已上兔之所主皆治皮膚瘡瘍蓋兔肉多食令人色痿損陽事絶血脈此亦涼血散熱故也二十七安班散此為涼血解毒生肌寬腸導熱利小便快膈藥也瘡痘有熱無寒者可服之升麻赤茯苓羌活黃耆人參桔梗炒枳殼麩炒甘草各等分為細末每服一錢水七分盞紫草薄荷少許同煎至四分盞溫服量兒大小增減二十八蘿蔔湯用開花蘿蔔煎汁時時飲之開花取其欲出之義蘿蔔治嗽定喘下氣消脹解毒解渴解面毒皆勻氣消壅藥也氣勻則瘡疹出快矣二十九紅子湯平調瘡疹紅花子紫草茸各一兩麻黃去節升麻各半兩為細末每服半錢煎薄荷湯入酒一滴調下此用麻黃表毒氣令出升麻解蘊毒紫草滑竅紅花子本草治天行瘡不出吞數粒即出故用之三十快班散此用貫衆味微寒主腹中諸熱邪毒患痘煩渴咽燥喘急大便閉小便赤澀口乾目赤皆裡熱也宜服之如無裡熱反為害矣若當服不服亦為害也貫衆赤芍藥各一兩甘草炙升枳殼麩炒各半兩為細末每服一錢水一盞竹葉七片煎至五分盞去滓溫服量大小與之三十一甘草散治瘡未出及已出躁渴者大甘草不以多少炙為末每服一錢或二錢水一盞煎至六分去滓溫服無時呷之以解利熱毒瘡出遲者常服紫草飲子可針兩腕硯子骨間男左女右取之或灸一壯亦助發瘡痘毒氣已發不必用三十二紫草如聖散瘡痘初出急服吃乳嬰兒與乳母兼服四五歲外只令兒服之紫草二兩陳皮去白一兩為細末每服一錢水一小盞入蔥白五寸煎至五分盞去柤溫服量兒大小服之夫瘡疹氣勻則出快紫草滑竅去心腹邪氣陳皮快氣蔥白髮散開泄腠理也三十三化毒湯治痘疹已出未出紫草升麻甘草炙各半兩銼如麻豆大水二盞煎糯米五十粒煎至一盞去柤放溫分作數服此方名為化毒至於主治無不切要痘瘡欲出渾身壯熱不思飲食服此一貼即內消已有一兩顆出即解其半若令出則自頭焦只三服差瘡疹無他病相兼者無不愈又在人稟受虛實不同感風寒食驚不一仲景云正患傷寒如其人有故疾發動則兼以故疾藥攻之活人書云傷寒病中又感異氣乃時令寒暑燥溫風不節脈息與少陽相異證候與傷寒不同當隨宜以法治之不可泥於一曲也此藥但能化實熱之毒若稟虛而浮熱伏冷者皆當調適以平為期三十四調中散白茯苓紫河車人參甘草炙等分為細末每服二錢水一盞生薑二片棗二枚煎至六分去柤作兩三次溫服三十五紫草木通湯木通紫草人參茯苓糯米各一兩甘草炙半兩為粗末每炒四錢水一盞半煎至一盞分溫三服痘瘡熱甚則出而心主熱熱甚則小便赤澀其熱蘊蓄而生病此以木通導心火糯米歸脾土心清則不生他病脾平則五藏自安也三十六如聖湯治瘡痘毒攻咽喉腫痛桔梗炒甘草炙牛蒡子各一兩麥門冬去心半兩為細末每服二錢沸湯點細細呷服入竹葉煎尤妙三十七蟬退甘草湯發痘疹大蟬退二十一個去尖甘草一錢半用水半碗煎至一小盞旋服之已驗三十八紫草枳殼湯治瘡出不快倒靨紫草木通甘草炙枳殼麩炒等分為粗末每服二錢水一小盞煎至半盞去滓溫服大抵壅瘀則榮衛不行令出不快則倒靨用枳殼寬腸木通利小便紫草滑竅治蘊蓄邪氣皆令易出大小便祕澀者無不可用三十九當歸散初濕瘡痘便驚狂身熱汗出不增寒不惡風脈洪數者當下之痘未發前宜服當歸一兩甘草炙二錢為細末每服二錢水一中盞豆豉十粒煎至半盞去滓量兒大小服以利為度逐日冷吃甘草汁三歲已下一歲已上加減服之四十快毒丹瘡疹氣勻則出快蓋血與氣相隨內有邪熱則血妄行使氣不勻宜服瘡出亦可服牽牛黑者略炒木香各一分肉豆蔻半兩青皮一兩半生半熟搗羅細末滴水丸如黍米大每服七粒或十粒濃煎紫草蔥白湯下乳前服量大小加減四十一胡荽酒治瘡已發未發蓋心主瘡瘍主煩躁主驚悸主痛癢胡荽味辛能通心竅而通之則瘡易出若大便利者紫草胡荽皆未可用紫草性寒胡荽利大腸故也宜先溫藏府如常痘疹未退可用胡荽三兩細切以酒二大盞煎沸沃胡葵以物合定不令泄氣候冷去滓從頂面頰眼目背膂兩腳胸腹微微塗之令遍惟面勿塗錢氏用好酒二盞煎一兩沸入胡荽四兩再煎又云病人左右上下常令有胡荽氣令闢汗氣惡氣及外人穢觸使瘡痘出快既不可受風冷然亦不可臃遏常令衣服得中四十二葡萄酒葡萄甘平利小便取穗出快之義研酒飲之四十三辟惡氣痘疹未出之間房中宜燒蒼朮豬甲二物以辟惡氣父母宜戒色欲令人守門勿使外人入房觸犯則痘難出或觸犯而病上喘面青黃者猶輕因此犯而死者不少四十四燒乳香瘡痘正發忌諸臭穢惡氣以逆榮衛恐陷伏倒靨也房中常燒乳香不絶可去惡氣四十五黃土散痘瘡已出不可發表表虛更增班爛若發膿痛甚者用乾淨黃土羅為細末傅之仍數數食蜜為妙四十六芒硝豬膽汁治瘡班爛因表太過一手一足面腦腹背各為一片瘡相似令人不忍觀之用芒硝豬膽汁調塗瘡上勿令動觸直候疕落有瘡濃汁不通臥席宜麥麩簟臥將息為妙四十七黑牛糞治膿泡出煅黑牛糞貼之令速愈而無瘢痕已出未平忌勞力狐臭人薰觸未愈不可當風當風則成瘡瘢四十八黃柏膏欲用胡荽酒噴時先用此方塗面上然後噴四肢大人小兒愛護面目悉宜用之黃柏一兩甘草四兩生緑豆粉兩半搗羅細末以生麻油調如薄膏從耳前眼唇並厚塗三五遍早用塗面面無瘡痘塗遲縱有瘡痘亦少四十九白芥子散治痘令不入目白芥子為末水調傅腳心引熱歸下則瘡不入目矣五十爛肉汁治痘瘡用爛肉汁洗之干傅亦得五十一蟬蛻散治痘疹身熱似傷寒只耳尖腳稍冷或腹痛大便祕者是痘疹也用蟬蛻二十一個洗去泥為末水一盞慢火煎至半盞去滓量兒大小溫服服三五次不是痘亦無害欲痘發出加甘草一錢半煎一盞旋旋服纍效小兒伏所蘊熱毒蟬蛻鹹寒可以制之況有感暴風寒作熱客於表者蟬蛻亦治風毒充於皮膚瘙癢不止驚癇夜啼癲疾寒熱驚悸皆宜用之五十二猴梨酒治痘出不快猴梨子五個又名山楂子酒煎入水浸服痘瘡即出五十三麻黃紫草湯治痘不出麻黃去節人參各一分杏仁七枚去皮尖為粗末每服二錢水二盞紫草五寸煎至一盞去柤分四服作二日服未可服諸藥五十四水解散治瘡出不快煩躁不得眠或出而身體尚熱者大黃黃芩桂心甘草炙芍藥各二錢麻黃去節四兩為末患者以生熟湯浴訖暖水調下二錢相次二服得汗利便差強實人服二方寸七氣實者亦用三伏中亦宜用之若去大黃則春夏通用凡人飲酒食瓜果多以生熟湯浸身皆為酒及瓜氣味此用浴身亦欲出其毒也五十五玄參升麻湯治傷風傷寒風熱驚食等熱運於肌或汗或下後毒氣不散表虛里實熱發於外故身班如錦紋甚則煩躁譫語兼治喉閉腫痛玄參升麻甘草炙等分銼如麻豆每抄三錢水一小盞煎至半盞去柤溫服無時五十六麻黃黃芩湯治痘出不快煩躁不得眠麻黃去節一兩黃芩赤芍各半兩甘草炙官桂去皮各一分為細末每服二錢暖水調日三服兼治天行熱氣痘瘡不快煩躁昏憒或痘出身尚熱疼五十七升麻黃芩湯升麻黃芩乾葛芍藥各三錢甘草炙錢半銼如麻豆每服二錢水一中盞煎至六分去滓溫服治時行瘡出不快煩躁不得眠者加木香半錢五十八葛根散治天行熱毒氣欲發瘡痘作熱甚疼者宜此解肌出汗葛根麻黃各一兩石膏二兩黃芩芍藥桂枝甘草各半兩為粗末每服四錢水一盞煎至半盞去柤溫服無時自出汗者去麻黃五十九四順散治瘡痘四五日不大便瘡又盛出卻喘粗氣急腹脹小便赤澀宜此大黃甘草炙芍藥當歸各等分為粗末每服抄三錢水一盞煎至六分去滓溫服無時若得氣通不喘腹不脹止服初覺有赤點大便如常小便赤澀用此通利令出快也若色紅而快不須通也六十利毒丸治痘瘡欲出胃熱發溫壯氣粗滿大小便赤澀睡中驚煩渴口舌乾手足微冷多睡時嗽涎實脈沉大滑數便宜服此大黃半兩膩粉大青各一錢龍腦硃砂各錢半檳榔生牽牛黃芩青黛各錢半上為細末麵糊丸如黃米大二歲服八丸生薑蜜水下不動再服量兒大小虛實加減六十一紫霜丸治夾食頭疼壯熱腹脹為夾食方見和劑方六十二消毒散治痘瘡已出未能勻透毒氣壅遏出不快壯熱狂躁咽膈壅塞睡臥不安大便祕澀及大人上膈壅熱咽嚨腫痛胸膈不利加防風名鼠黏子湯牛蒡子炒六兩甘草炙二兩荊芥一兩為粗末每服一錢水七分盞煎至四分去滓食後臨臥服此治大便祕澀是治裡熱也牛蒡子辛平性涼治風腫暴飧熱肉生風咽喉四肢風腫解丹石毒能透肌出瘡為痘疹所宜大便利不可服六十三化班散加知母名石膏知母化毒散石膏紙裹煨令透或用泥瓦燒之取出去火毒為末切知母等分為末熱水調下一字或調塗唇上去頭痛除昏發泄瘡子治小兒瘡班此二方極妙後方恐大涼六十四地黃雄黃飲治瘟毒發班瘡痘出不快者乃冬應寒反熱或被積寒暴發熱毒不得宣泄令身班如錦文心悶咳但嘔清汁葛根桔皮地黃雄黃飲淡豆豉地黃各四兩以豬脂一斤和勻露一宿煎三分減去一分去滓下雄黃末一錢麝香半錢攪勻量兒大小服過多反有所損六十五犀解散治瘡疹不惡寒煩躁多渴小便赤澀或赤班點犀角鎊甘草炙各半兩防風二兩黃芩半兩為粗末每服抄三錢水一盞煎至七分去滓溫服無時六十六紫河車散治班瘡毒氣不解攻咽喉聲音不出舌頰生瘡遏逆煩悶潮熱面赤紫河車茜根貫衆各三錢芍藥甘草炙各半兩為粗末每服一錢水七分盞生薑一片煎至四分去滓溫服一方用牛蒡子六十七玳瑁湯治時行痘瘡及赤瘡疹子未發令內消已發解利毒令不太盛生玳瑁生犀各以冷水濃磨汁二合同攪令勻每服半合微溫一日四五服為佳又云毒氣內攻紫黑色出不快用玳瑁水磨濃汁一合入豶豬心血二皂子大以紫草濃煎湯都作一服服之二藥微寒用治熱毒知其無失且主瘟疫盅瘴解百毒通血脈消前邊腫用解蘊毒宜哉六十八白虎湯治痘疱麩瘡斑瘡赤黑出不快及瘡毒餘熱並溫熱病暑中氣煩躁熱渴大便祕小便赤四時天氣大熱及冬月天氣大溫則可服之石膏四兩知母兩半甘草炙三分人參半兩為粗末每服抄三錢水一小盞粳米二十粒煎至半盞去柤溫服無時此藥治中暑及痘瘡天氣大熱與肌熱心熱相應煩躁狂亂渴水發黃鼻衄吐血便血淋祕夏月痘瘡煩躁加麥門冬竹葉名竹葉湯六十九人參竹葉湯治夏月壯熱煩躁心煩乾渴心神不寧痰壅嘔逆及瘡後餘毒小便赤澀成赤班兼治中暑虛煩半夏湯泡洗七次人參當歸淡竹葉天門冬去心各等分為粗末每服抄二錢水一小盞薑三片煎至半盞去滓溫服無時瘡痘不惡寒但煩躁小便赤澀多渴成赤班點者宜之七十三物散治瘡痘毒氣少倒伏不出大小便利生地黃炒地黃炒硃砂另研一兩為細末每服一字煎胡荽酒少許同溫湯調下七十一青黛散治瘡未作膿痛甚心膈煩躁睡臥不安宜服用波斯青黛如棗核大以水調服一方用磨刀水調七十二野通散治痘出不快並傷寒不語干野人糞炭火煅為灰片腦麝香各少許為細末每服一錢新汲水入蜜調下野人獼猴也黃色尾長面赤糞治蜘蛛咬瘡此治痘疹出快明矣若人家養者肉及屎違其本真不用蜘蛛咬瘡久而不愈其絲延蔓遍身用雄黃青黛麝香水調以蜘蛛試之則化為水果驗七十三無比散治痘出不快及黑瘡子一切惡候硃砂一兩牛黃片腦麝香膩粉各一分上同研細小兒一字大人半錢水銀少許入小獖豬尾血二三滴新汲水少許調服若得寧睡然後下如爛魚腸葡萄穗及臭涎惡物即安小兒用乳汁數滴尤妙古人論症處方罔有不效須是藥病相對則一下咽而病去若不相對下咽則死也如傷寒有用硝黃而愈者有用薑附硫桂著艾而愈者此合用而用之也設若合用涼而反用熱合用熱而反用寒豈不下咽則死矣無比散治痘瘡熱毒太盛壅瘀榮衛不行外不得泄內不得通毒氣在裡外則瘡疹黑色內則有腹滿喘急譫語昏困大小便不通者宜服之也此有其毒則用其藥固無不效設或痘瘡黑靨里無腹脹喘急譫語昏困大便如常或反利則此藥不可用矣常言對症用藥是也一士夫子弟八歲患痘黑靨診其胃脈太弱言平時胃弱不能進食今痘黑靨醫用升麻湯羌活散藏府日夜數次米穀不化後用溫藏府藥更不止而卒故下藥先審病之虛實寒熱豈可見黑靨一概便投涼劑寧不誤人七十四黑痘湯治瘡痘未作膿心膈躁睡不安用黑豆煮汁徐徐溫服之七十五透肌散治症與三十三化毒湯同七十六黃連散治痘瘡毒氣上衝口舌並下部有瘡而熱者黃連一兩去毛為末每服一錢水一盞煎至五分去滓服無時量大小虛實與服痘瘡初發亦宜服之七十七通關散治班瘡水痘心悶煩躁發渴小便赤澀口舌生瘡通心經利小便山梔子大黃炒各一分木通瞿麥甘草炙車前子炒茯苓人參滑石各三分萹蓄半兩為細末每服一字二三歲者水半盞燈心煎至三分稟受弱者五苓散導赤散人參白朮散亦得七十八紫雪治大人小兒一切熱毒胃熱發班消痘疱麩疹及傷寒胃熱發班並驚癇涎厥走馬急疳熱疳黃瘦喉痹及瘡痘毒攻咽喉水令不下黃金一百兩寒水石石膏各三斤犀角羚羊角各兩玄參一斤沉香木香丁香甘草兩升麻六兩用水五斗煮金至三斗去金入諸藥再煎至一斗濾去柤投好芒硝二斤半微火煎柳篦不住手攪候微凝入盆中更入硃砂麝香末各三兩急攪候凝冷貯密器中勿令見風每服一錢溫水化下小兒半錢或一字咽喉危急捻少許乾咽之七十九竹葉湯治痘疹不惡寒但煩躁小便赤澀多渴成赤班點者宜此與犀角散石膏四兩知母二餞麥門冬去心甘草炙各一兩為粗末每服抄二錢水一盞竹葉一握煎至半盞去柤溫服無時八十導赤散治痘疹心經蘊熱睡臥不寧煩躁小便不利面赤多渴貪乳者渴也人參木通麥門冬去心生地黃甘草炙等分為粗末每服抄二錢水一小盞煎至半盞去柤溫服無時八十一救生散治膿疱惡候危困陷下黑陷此藥治熱毒倒入藏府者不得已用之獖豬血臘月以新磁瓶盛挂當風陰乾場馬牙硝各一兩硃砂牛黃片腦麝香各一錢同研極細每服一字新汲水調下大便下惡物瘡轉紅色為度不過再服神驗八十二犀角湯又名調肝散治痘疹及赤瘡子犀角鎊大黃炒鉤藤桑白皮蜜炙甘草炙麻黃去節一兩龍膽半錢石膏栝蔞黃耆炙各半兩為粗末每服一錢水一小盞煎至四分去柤溫服量兒大小加減服瘡子退後濃磨犀角水塗之更良錢氏亦用此藥治痘疹太盛令不入目此治風盛氣實心肝血熱津液內燥大便不通毒氣上盛表熱未散也大黃瓜蔞治內燥鉤藤龍膽治風血熱桑白皮石膏治上焦熱麻黃黃耆散肌熱犀角甘草解毒熱大抵用藥貴乎與病相主則病去而正氣自復否則反為大害如犀角散自非大便數日不通喘急悶亂煩躁譫語豈可用乎恐藥病不相主也八十三牛黃散治痘疹陽毒入胃日夜便血腹痛啼哭牛黃一分鬱金一兩為細末每服半錢以漿水半盞煎至三分去滓溫服量兒大小增減日二服八十四玉露散治暑月痘疹煩躁熱渴寒水石半兩軟而微青黑中有細紋者是甘草一錢生用方解石堅白有牆壁手不可折者是如無以石膏代堅白似石膏敲之假假皆方者是半兩同為細末每服一字或半錢一錢食後溫湯調下八十五犀角飲子解熱毒去風疹犀角甘草炙各半兩防風二兩黃芩一兩為粗末每服五錢水一小盞煎至半盞去滓溫服無時八十六犀角地黃湯活人書云傷寒及瘟病應發汗而不發汗致鼻衄吐血不盡內有瘀血面黃大便黑此主消化瘀血兼治痘疹太盛犀角一兩生地黃半斤芍藥三分牡丹皮一兩銼如麻豆每服五錢水一盞半煎取一盞有熱如狂者加黃芩二兩其人脈大來遲腹不滿自言滿者為無熱不用黃芩八十七豬毛膏又名龍腦膏治痘瘡初作未能出透及已出盡內外熱毒貫注血泡如豆在於肌皮不結痂疕二者皆用之且瘡疹蘊伏毒熱欲出而未能透則熱甚動心心煩狂躁妄語或見鬼神此皆心熱也蓋心榮於血血熱則瘀瘀則色敗未出者則為鬼瘡子一出而便黑也已出者為黑靨大抵痘瘡自紅班成血疱血疱五七日結膿窠至七日不結膿窠者此是毒氣彌滿恐復入里古人用龍腦涼心血行榮衛用豬心血者以心歸心豬尾血者取其常動欲散外也況有狂躁煩悶未省者那以溫酒化下欲散而行榮衛也皆治熱毒太盛者間有虛而陷伏者亦用之誤人多矣又有當用一字卻用一錢熱少不能當之亦反為害如合用一字者且與半字如復寒渴甚當與水一斗且與五升正此意也既有心經熱兼有他虛寒症見者又不可輕服如吐瀉人發熱煩渴小便赤則不可全作寒治煩躁人大便自利小便清則不可全作熱治在醫者兩審不致偏局可也上用片腦半字許研細旋滴豬心血和丸以紫草湯化下煩躁狂悶未省者以溫酒浸服錢氏用豬尾血其意皆通八十八控心散班疹一服而出全蠍二十四個炒麻黃去節雄黃各一分為細末每服一錢胡荽煎酒調下蠍治癮疹中風半身不遂口眼斜語澀抽掣此能透諸筋脈雄黃主惡瘡疽痔透百節治疥瘍並痘疹毒氣不出也麻黃解肌泄邪惡氣消赤黑班毒三藥治痘當出而不出者若自然出者不須服也八十九獨味麻黃湯治倒靨用麻黃三十寸去節蜜拌炒香紫色為度水一盞煎五六分服一人得此方後知兗州仙源縣有工筆李用之子班瘡倒靨已至危困投此一服便出其應如神未至胃爛便血者皆可治也九十南金散治痘已出而復隱其勢甚危諸藥不效者萬無一失紫背荷葉霜後貼水紫色者白殭蠶直者炒去絲為細末每服一錢小兒半錢研胡荽汁和酒下米飲亦得在處印貼施人全活者衆有用龍腦人齒卒難得之惟此無毒效速九十一滑石散治瘡痘出遲恐瘀壅黑色膈上煩熱多渴小便赤澀面青氣粗大便不利此藥滑竅令瘡出快滑石甘草炙各等分為細末每服一錢雞子清酒各少許調服九十二橄欖核水治瘡倒靨橄欖核中截斷水磨少許服立發九十三快毒丹治痘疹氣勻即出快蓋血與氣相隨內有邪熱則血妄便氣不勻大抵痘瘡氣快自勻痘疹出亦宜服黑豆炒木香各一分肉豆蔻半兩麩裹煨青皮一兩半生半熟為細末滴水丸如黍米大每服七丸至十丸濃煎紫草蔥白湯下乳前服量兒大小加減九十四紅粉丹治藏府熱瘡出不勻龍腦一錢坯子胭脂天竺黃硃砂各一兩南星臘月釀牛膽中百日陰乾一兩為細末煉蜜和丸如雞頭實大每服一丸煎人參湯化下九十五乳香豬血膏治班痘不發乳香研細豬心血丸如櫻桃大每服一丸用水磨化下九十六紫金散治瘡痘倒靨及出不快紫草蛇退炒焦牛蒡子炒各半兩為粗末每服一錢水七分盞煎至四分去滓溫服無時蛇退治一切惡瘡十年不愈者用之良故也九十七鉤藤紫草散發瘡疹令出快鉤藤鉤子紫草茸等分為細末每服一字或半錢溫酒調下無時紫草滑竅利小便散十二經毒氣鉤藤治小兒寒熱十二驚癇蓋瘡瘍煩躁痛癢皆出於心驚癇心病也瘡瘍亦心所主故用之九十八麝香豬血丸治痘疹出不透旋取豬心血調麝香少許塗兩手心並塗些少口唇上即無極驗九十九木星飲子治瘡疹不出及出不快硃砂一分鬱金半兩為細末每服一字或二字量大小入片腦少許以新汲水茶腳少許調勻然後刺豬尾血滴三點入藥汁令服不過一二時辰瘡出紅活神效鬱金辛寒主血積下氣生肌止血破惡血尿血金瘡今痘疹出於心由於熱也硃砂微寒治熱安心熱有蘊蓄則壅瘀而不出用鬱金下氣消惡血則無壅瘀而出不遲矣一百四聖散又名紫草散湯治痘出不快及倒靨紫草木通甘草炙枳殼麩炒黃耆切焙等分為粗末每服一錢水一中盞煎六分去柤溫服內紫草發散黃耆止痛解毒生肌枳殼治腹脹令大小腸不祕氣通導心熱而利小便以甘草和之古人用藥有至理焉一百一脫殼散取雞哺出殼於新瓦上焙乾去膜取殼研如粉若痘疹倒靨不出或便血糞黑頭瘡昏腫用酒調一字塗兒唇上令舐或以調酒塗風池穴上心前或以熱湯調一字服一百二山梔子湯治麩疹及班毒毒盛黑色狀如蚊蚤所齧者山梔仁白蘚皮赤芍藥升麻各一兩寒水石甘草炙各半兩為粗末每服一錢水八分盞入紫草薄荷少許煎至五分去柤溫服一百三化毒散鬱金一枚甘草炙一分用水半碗煎令水乾去甘草將鬱金切片令乾為末用腦子半錢研勻入豬血研成稀膏煎薄荷湯化下一錢不過一服毒氣從手足心出乃差此五死一生之症若便血瘡壞無膿者不治一法蟬脫末一錢好腦子一皂角子大大豬心血三皂子大和作膏熱酒浸紫草令溫化下移時當發大熱瘡毒頓出然後依症調治一百四宣毒膏治毒盛痘瘡已出不快倒靨急服此藥曾經大效獖豬尾血臘八日取一升新瓦器盛硃砂乳香各一兩甘草馬牙硝各半兩片腦麝香同為細末豬心血拌勻用竹筒一個留底節盡入諸藥在內用紙數重系定挂大糞缸粱上至清明日取出暴乾更入腦麝各一錢研勻滴水丸如皂角子大煎人參湯化下一丸毒盛痘瘡黑靨服之痘轉紅活綻突神驗一百五百祥丸瘡疹黑陷耳尻反熱者為逆用百祥丸牛李膏各三服又云紫黑干陷者百祥丸下之不黑者謹勿下黑者無問何時十難救一或寒戰噤牙或耳黃腫紫急以百祥丸下之下之復惡寒身冷汗出耳骫反熱者死身溫欲飲水者可治又云黑陷不發寒者病未困宜百祥丸以牛李膏為助各一大服五日瘡復紅活血潤而愈紅芽大戟不以多少陰乾漿水煮軟去骨曬乾復入汁中煮汁盡焙乾為末水丸如粟大每服一二十丸研赤芝麻湯下無時吐利同一百六牛李膏又名必勝膏治倒靨又云已出未出快者宜紫草散玳瑁散之類重者牛李膏又云痘疹毒氣不散出不快及解犯黑色者宜用之牛李七八月結實黑圓成穗採黑熟者盆內研汁絹濾去滓銀石器盛慢火熬成膏磁器收常令透風每服一皂角子大煎杏膠化如人行二十里再進一服瘡疹自然紅色毒氣亦慢此藥神妙一切瘡出不快並可服無生者市肆乾者為末水熬代用董汲幼年病瘡見皮膚下不出及出不快及紫黑干陷惡症極危父母不忍見之遇錢乙下此藥得安因懇求真方遂傳於世但收採失時亦無全效九月後收取濾汁成膏每膏二兩研入麝香半錢用不津器貯或用桃膠半兩牛李子一兩炒為粗末每服一錢水七分盞煎至四分去滓溫服治療亦同一百七倍金散治瘡痘倒靨黑色鼠黏子炒二兩山楂子連核一兩減枤葉一兩為粗末每服一錢水一盞入荊芥穗紫草十根煎至四分去柤溫服一百八抵聖丸治班瘡不出反入取十二月老鴉左翅不計多少風中令乾辰日燒為灰用中等獖豬嘴上刺血丸如雞頭實大每服一丸取獖豬尾血少許溫水同化下未效二三時間再一服一百九溫生蟲散治倒靨取濕生蟲不計多少炒乾為末酒調下一字一百十白花蛇散治痘瘡倒靨白花蛇連骨一兩火炙令乾勿焦大丁香二十一枚為細末每服一錢小兒半錢以水解淡酒調下如黑靨者服之移時重紅如聖一百十一敗毒牛黃丹瘡子出定大便不通瘡中不幹真大黃大黃各一兩粉霜珍珠各一兩同研勻煉蜜丸如黍米大每服十粒煎人參湯下量兒大小加減一百十二大黃丸瘡痂起而能食用此下之錢氏曰未可以能食為有熱而便下須兼他症參看瘡痂起而能食食而腹滿不大便喘急昏甚譫語者方可下下藥但使去熱毒不為瘡害也若因能食一症便下之則不穩蓋熱氣未深故也如傷寒發厥須在六七日後蓋氣深方能發厥厥而下之表裡皆解大黃一兩酒浸蒸熟甘草炙一分川芎半兩黑牽牛半生半熟各一分為末糯米糊丸如麻子大每服量兒大小蜜湯下以溏利為度一百十三川黃散治麩疹及班瘡大便不通大黃銼微炒川芎各一兩甘草炙黃芩枳殼炒各半兩為粗末每服一錢水一小盞紫草少許煎至半小盞去滓溫服無時痘瘡大便不通不為大害不可便下須看大便欲通而不得通腹脹滿心胃悶喘急面赤睡中譫語有此諸症方可下之有諸熱症大便如常此又不可下熱在表故也當與小柴胡湯五苓散又看熱氣淺深藥當隨熱淺深而多少之可也一百十四大承氣湯治昏甚譫語妄言大便不通腹脹手心腋下有汗目睛黃赤喘急者厚朴八兩大黃四兩枳實一兩麩炒為粗末每服五錢水半盞煎至二分入芒硝一字去滓溫服無時一百十五益黃散治胃冷嘔吐脾虛泄瀉或因瘡煩躁渴水飲冷過多致傷脾胃丁香訶子煨青皮去瓤陳皮去白木香各一分為細末每服一錢水半盞煎至三分盞去滓溫服無時一百十六參朮丸治脾胃傷冷外熱裡寒不思飲食身常壯熱大便或溏色白或患痘疹身有大熱因食冷物或冷藥過度或瀉或腹脹或瘡出瘢白無血色此由裡寒脾胃伏冷榮衛不行致令毒氣內伏不出服之其瘡瘢白無血色者則從四周紅暈再作膿結痂而愈人參白朮乾薑炮甘草炙各一分為細末米糕泡糊丸如麻子大每服百餘丸溫水或米飲吞下食前仲景治傷寒輕者用理中湯重者用四逆湯此足陽明胃經而感寒邪胃乃中州之府故曰理中以辛甘發散為陽而退寒邪也或煉蜜丸之曰理中丸蜜甘入脾嚼下便化於中焦今參朮丸以粳米糕丸者取其難化服在胃中滲漉漸化則中焦得暖脾胃嘉燥其熱自歸此所以能治熱也一百十七二和散治瘡疹並傷寒冷熱不和陰陽痞結氣不升降服之調榮衛和冷熱升降氣消食快氣藿香葉香附子炒去毛等分為細末每服抄一字溫水調下無時一百十八六神散治脾胃虛弱津液燥少內虛不食身發虛熱人參白朮茯苓甘草炙白扁豆炒黃耆蜜炒等分為細末每服抄二錢水半盞生薑一片棗一枚煎至三分去滓溫服無時身熱甚者加烏梅少許煎服一百十九治中湯治痘作時熱渴或飲冷水或食寒物嘔吐下利不食身雖熱其中寒人參白朮乾薑炮甘草青皮陳皮去白等分為細末每服一錢水半盞煎至三分去滓溫服無時量大小加減一百二十胃風湯症候並方見集驗方一百二十一干寒甘草湯治瘡疹服冷藥太過咳嗽手足冷脈遲自利嘔吐不食乾薑炮甘草炙各四錢銼為散水一升二合煎至四合去滓溫服一百二十二胃愛欲調理脾胃吐瀉班瘡末出醫者不識形症便將冷藥冰卻瘡疹致令內伏不出將此調理如無汗用控心散發之後下羌活散胃愛散糯米一兩干淡木瓜三分甘草一分丁香十六個炒藿香葉紫蘇葉各一分同研為細末每服一錢或半錢煎粟半棗子湯調下一百二十三勻氣湯取餘毒後調理桔梗洗干五兩甘草炙二兩白乾薑一分縮砂陳皮去白茴香洗各一兩為細末每服半錢或一錢用霜木瓜或紫草鹽煎湯調下一百二十四豆乳散治痘疹間偶滑泄不止甚者宜服肉豆蔻一枚乳香一豆大為細末米飲調下一百二十五薑附湯治痘半出半不出或出盛時卻下利肢厥嘔逆腹脹吃噫急與理丸四逆薑附湯之類不須疑已試驗也大便自利腹脹者是熱毒被冷所搐不能出則為下利其毒小得出則為腹脹當此以理中丸四逆薑附等溫之則利止熱毒復出脹自消瘡亦自出矣又有痘疹半出或不出或出盛時大便不通小便赤澀喘粗腹脹唇齒乾口燥渴引飲譫語者當急下之此是毒氣壅瘀欲出而出不辦故腹脹下之熱毒散榮衛伸則里脹消外瘡出合溫合下皆得其宜若下膿血而腹脹者又非此症宜南金散乳香豬血膏理中丸薑附湯之類一百二十六七珍散調胃進食滋養榮衛人參白朮茯苓山藥黃耆蜜炙甘草炙白扁豆炒各等分為細末每服抄二錢水一盞薑三片棗一枚煎至六分盞連滓溫服無時加粟米名八珍散昔人患不食諸藥不效用此數日飲食大進脾土居中燥濕皆非所宜但得其中則水升火降脾受穀味矣一百二十七薤白湯治痘疹下利黃赤膿血及身熱薤白切半盞豆豉一盞山梔子十枚水五盞煎薤白爛為度去滓量大小服解去惡積也一百二十八活血散認是瘡症不出或出遲或倒靨白芍葉炒為細末溫酒調服如欲止痛用溫熱水調服此調榮衛藥也大抵痘疹氣勻則出快榮衛無阻則氣行矣芍藥主時行寒熱消癰腫則治瘡疹矣經云足得血行目得血明手得血握活人書云感寒脈大尺弱兩足拘攣為下焦血少用白芍藥六兩甘草半兩煎湯三服遂腳伸能行此亦活血行榮衛也一百二十九人齒散治瘡疹已出不快既出倒靨瘡疹作熱脈反遲或攻皮膚而出遲或面額赤脈不洪大或服涼藥過多血澀氣弱而出不快隱隱在皮膚間以酒調服之錢乙治瘡疹倒靨入麝香酒調服之尤佳或加赤小豆七粒薄荷酒調服之若黑色者名鬼瘡子用獖豬血調下二錢移時再服用人齒脫落者磁瓶固濟大火煅令通赤候冷取出為末薄荷酒調服半錢良久脈平毒散瘡如粟米而出此為發出瘡疹之藥昔有患瘡疹已出而稍遲遂用正氣散加白芍藥又用胡荽酒猴黎酒尚出遲渠家謂藥太緩夜來自燒人齒五枚酒調服之一身瘡疹盡出豫聞大駭再診其脈已微觀腦後並兩腳盡白色是榮衛弱毒氣少而藥力太過陽氣少而無以應接故無血色也陽氣盡出於外則裡寒寒氣成濕濕必濡瀉急以二氣丹為小丸服至半兩水瀉二日方止又服內補散治瘡痘痘成班爛遍體成片將息月餘方愈此因人齒散表過故也如傷寒發汗須看榮衛之淺深瘡疹表出須看蘊熱之多少若蘊熱少而用藥過則為班爛故已出未快者宜活血散猴黎酒葡萄酒之類既出而倒靨與稟受弱者須人齒散則藥病合宜而相當也不爾則病輕藥重反以為纍後人不究毒氣輕重一概用藥因此夭橫者多矣人齒治乳癰破腫出箭鏃則表瘡疹宜矣若誤用早為班爛為虛脫為重寒不可不知前云服人齒散脈微而瘡色白為外陽微也濡瀉為內陰盛也先用二氣丹後尚濡泄若用之遲豈不虛脫又有田舍及市井小兒患痘行走當風狂服硝黃無害者恐富貴之稟非負荷者比各隨宜而治一百三十內補散治正患痘中或感外寒或內傷生冷或服涼藥過多因生吐瀉脾虛血澀痘疹遲遲不出肌瘦而無血色宜內服調脾胃藥外服此方滋養血氣瘡毒得出人參黃耆白芷當歸肉桂桔梗炒川芎木香甘草炙防風厚朴薑製阿膠炒珠橘皮去白等分為細末每服一錢入酒二匙溫湯浸調服無時王子建云仲景論症多而用藥少男子詳而婦人略此亦不考也若使仲景存日其方有餘用矣蓋無壞病也今醫治病惟利是圖動輒差誤後賢處方皆是救其差誤故方愈多耳治瘡用內補散亦救其差誤也俗云瘡是熱每見藥稍溫便以為誤殊不知傷寒是傷於寒間用硝黃升麻知母之類此皆救一時不及不可偏執使緩急療病以致敗事一百三十一赤茯苓湯治痘出後咳逆脅痛不下食脅痛者由病後毒氣混亂阻於升降左右為陰陽之道路氣之所行處今氣滯為脅痛以枳殼寬腸下氣令氣順脅不痛也大青梔子去蘊熱升麻解毒赤茯苓導心火利小腸使熱不傷於肺則咳逆自平耳赤茯苓甘草炙大青升麻枳殼麩炒各半兩梔子一分為粗末每服一錢水一小盞入苦竹葉七片豆豉三十粒煎至五分盞去滓分為三服日三四服量大小以意加減一百三十二小柴胡湯治發熱甚而嘔者柴胡人參黃芩各三兩甘草炙半夏各二兩半湯泡七次為粗末每服三錢水一盞薑二片棗一枚煎至半盞去滓溫服咳嗽加五味子頭熱發熱肢節疼四味升麻湯大便不通四順飲大便自利黃黑色者此毒亦有所出不必廣服湯劑大便自然通瘡亦稀少而快利只與四味升麻湯荊芥散不可以溫藥助之下利甚者卻與少溫之一百三十三大青四物湯治熱病十日已上發汗及吐利後熱不除身上班出大青四兩豆豉八合阿膠甘草炙各一兩銼如麻豆每服抄五錢煎至六分去滓炮阿膠令化服一百三十四砂糖水瘡作膿窠是毒氣盡出在肌但未結靨調砂糖水與則瘡干若服血泡未成膿泡乃毒未出盡便與砂糖水損目者多矣不特此也糖蜜棗柿即瘡入目及煮鵝鴨雞卵兒聞卵氣目中即生翳膜更不可食也滅瘢瘡子將欲干時須與掐去痂令血出定無瘢若從他干定隱有瘢也一百三十五藍根散板藍根一兩甘草炙三分銼為細末每服半錢或一錢取雄雞冠血三兩點溫酒少許調下食後一百三十六甘露飲解胃熱痘瘡已發後餘熱溫壯齒齦宣腫牙痛不能嚼物飢而不欲食煩熱面黃及病後瘡疱乳母俱可服甘草山茵陳石斛枳殼麩炒枇杷葉黃芩生地黃麥門冬去心等分為粗末每服抄二錢水一盞煎至八分食後溫服牙齒動搖牙齦腫熱含漱並服一百三十七槐花散治班瘡餘熱不退赤小豆槐花各炒二錢麝香少許為細末每服半錢蜜湯調服無時一百三十八淨心散治痘出欲盡便服之如入眼即自退蛇脫一條燒灰皂角不蛀者十莖燒灰為細末每服一錢小兒半錢熱水調下加甘草半錢生用一百三十九青金丹治瘡疹病後取下餘毒滑石子白丁香研過天南星青黛細羅輕粉水銀各二錢先以鉛二錢銅銚熔化便入水銀拌和瀉地冷用上川巴豆去皮心膜七十三片無缺損者用井水浸一宿懸當風吹乾爛研上藥和勻軟飯丸如梧桐子大巴豆不去油依形症用湯使傷寒後取積痰煎蔥白湯下疳蟲牛肉汁下驚風肚中緊硬面青黑金銀薄荷蔥白湯下因傷著肚中及腹皮上微熱腹脹夜間作熱似疳又不是疳面青黃色眼微黃腹中有積用皂子二七粒灰內煨過水一盞煎至半盞送下有積作瀉魚鮓湯下氣積炒茴香湯下周歲十四丸二歲十八丸七歲二十四丸看大小加減須是四更初天明通下積來盡時可依形症用藥補之臨服恐先吐下涎來不妨一百四十黃芩散治瘡出盡恐毒入目極妙黃芩山梔子黃丹等分細末牛蒡子葉取汁調塗頂門一百四十一燈心湯治痘後煩喘小便不利燈心一把鱉甲醋煮黃二兩銼散每服一兩水八合煎取四分服量大小加減一百四十二黃耆散治壯熱不退涼肌膚散熱黃耆場柴胡乾葛甘草炙各等分為末每服一錢薄荷三葉水半盞煎至三分約三呷潔心服之發熱頻日未退恐是瘡疹量其虛實用之一百四十三硃砂膏治驚積驚熱病後可常服硃砂半兩硼砂馬牙硝各三分珍珠末一錢玄明粉二錢已上並研片腦麝香各一錢各為末一處拌和用好蜜煉成膏諸般驚用藥一黃豆大金銀薄荷湯少許化下如遍身潮熱甘草煎湯化下一月內小兒不通下藥用乳調塗乳上令兒吮之一百四十四宣風散治身熱煩渴腹滿而喘大小便赤澀面赤霍亂若大吐當利小便不吐者宜此檳榔二個陳皮去白甘草炙各半兩黑牽牛四兩半生半炒為細末三兩歲蜜湯調下半錢已上者一錢食前服一百四十五甘桔湯治痘疹咽喉疼痛生瘡桔梗二兩米泔水浸一宿焙乾用甘草炙二兩為細末每服二大錢水一盞煎至五分食後溫服如肺熱手撏眉目鼻面加阿膠半片炒過同煎至五分服一百四十六定命硃砂散治痘疹毒氣不出或出後乾黑色服此發出毒氣瘡當細紅而出也硃砂半兩生龍腦滴乳馬牙硝四味各研甘草炙各二錢五味研勻用臘月新獖豬血半升同研取青竹筒二尺留兩節開一頭作竅子注藥在內黃臘塞竅油絹裹封勿令泄氣埋地中一百五十日取出水洗挂風中四十九日劈開取藥研末每服半錢新汲水下一百四十七鼠黏子湯即消毒散加防風治療相同主痘出太盛一百四十八班瘡入眼牛蒡子人參各二兩同研細末每服二錢糯米薄粥調下神效不可具述一百四十九乾葛雞頭湯治瘡出不快既出不正色取粉乾葛為細末每服三錢用雄雞頭一個搗爛入葛末用水二鍾煎至一鍾去柤服其驗如神一百五十人參清膈散人參柴胡當歸芍藥知母桑白皮蜜炙黃耆蜜炙白朮紫菀去土茯苓石膏滑石地骨皮各七錢半上銼水煎食遠溫服一百五十一六味人參麥門冬散麥門冬一兩去心人參觀白朮甘草陳皮去白厚朴薑汁炒各兩半㕮咀水煎溫服無時一百五十二七味人參白朮散即錢氏白朮散一百五十三敗草散乃蓋屋或蓋牆多年爛草取其多經霜雪雨露感天地陰陽之氣善解痘毒不以多少曬乾或焙乾為極細末若瘡汁不幹黏衣惹席濕爛不能轉動可用二三升攤席上任其睡臥為妙
